const seriesVisible = { fs:true, fd:true, rs:true, rd:true, fv:true, rv:true };

// ═══════════════════════════════════════════════════════════
//  STATIC EQUILIBRIUM INIT
// ═══════════════════════════════════════════════════════════
function getMsprung() {
  return (184 + P.mass) - P.m_unsprung_f - P.m_unsprung_r;
}

function initPhysics() {
  const K_F = P.k_f * 1000;
  const K_R = P.k_r * 1000;
  const Ms  = getMsprung();
  const W   = Ms * g;   // total sprung weight

  // Static spring compressions at equilibrium (clamped to 95% of max travel)
  const sagF = Math.min(W * 0.49 / K_F, TRAVEL_MAX * 0.95);
  const sagR = Math.min(W * 0.51 / K_R, TRAVEL_MAX * 0.95);

  // Wheel ground contact (natural position = wheel just touching terrain)
  const nat_f = calcNaturalWY_m(worldX_m,            WHEEL_R_F);
  const nat_r = calcNaturalWY_m(worldX_m - WHEELBASE, WHEEL_R_R);

  // At equilibrium each wheel penetrates the tire spring by exactly enough to
  // support its share of the unsprung + suspended load.
  const pen_f = (K_F * sagF + P.m_unsprung_f * g) / P.k_tire_f;
  const pen_r = (K_R * sagR + P.m_unsprung_r * g) / P.k_tire_r;

  // Front fork: set compression DOF directly (negative = compressed)
  forkSlide_f  = -sagF;
  vForkSlide_f = 0;

  // Rear suspension: seed the swingarm at the nominal sag angle. The 500-step
  // settle loop below relaxes it to the true equilibrium for the current spring.
  swingAngle = SW_PHI_SAG;
  swingRate  = 0;
  rearWheelY_m = nat_r + pen_r;          // seed: rear wheel on terrain
  rearWheelX_m = worldX_m - WHEELBASE;   // approximate, updated by physics after settle

  // Solve 2-eq system for equilibrium pitch and chassis CoM height.
  // Front: steerHead_Y = chassisY + A_FRONT·pitch = nat_f + pen_f − (REST_F − sagF)·cosRake
  // Rear:  rear axle world Y = chassisY + ax_c·pitch + ay_c = nat_r + pen_r   (small-angle)
  //        where (ax_c, ay_c) is the axle position in the chassis frame at the sag angle.
  const cosRake = Math.cos(RAKE_RAD);
  const ax_c  = SW_PIV_X_FROM_COM - SWINGARM_L * Math.cos(swingAngle);  // chassis-frame axle X
  const ay_c  = SW_PIV_Y_FROM_COM + SWINGARM_L * Math.sin(swingAngle);  // chassis-frame axle Y
  const eq_f  = (nat_f + pen_f) - (REST_F_M - sagF) * cosRake;          // steerHead_Y
  const eq_r2 = (nat_r + pen_r) - ay_c;                                  // chassisY + ax_c·pitch target
  pitchAngle = (eq_f - eq_r2) / (A_FRONT_M - ax_c);                      // A_FRONT − ax_c ≈ wheelbase
  chassisY_m = eq_f - pitchAngle * A_FRONT_M;

  // Seed derived front wheel world position from initial chassis pose
  {
    const φ0 = RAKE_RAD - pitchAngle;
    const steerY0 = chassisY_m + A_FRONT_M * pitchAngle;
    frontWheelX_m = worldX_m + (REST_F_M + forkSlide_f) * Math.sin(φ0);
    frontWheelY_m = steerY0   + (REST_F_M + forkSlide_f) * Math.cos(φ0);
  }

  vChassis = 0; pitchRate = 0; vForkSlide_f = 0; swingRate = 0;
  rearContact = false;

  // Settle with terrain FROZEN (speed=0) so bumps don't create transients
  // that overwhelm the initial equilibrium estimate.
  const savedSpeed = P.speed;
  P.speed = 0;
  for (let i = 0; i < 500; i++) simStep(0.005);
  P.speed = savedSpeed;
  vChassis = 0; vForkSlide_f = 0; swingRate = 0; pitchRate = 0;
  rearContact = false;
  initialized = true;
}

// ═══════════════════════════════════════════════════════════
//  DAMPING FORCE  (using per-wheel LUTs)
// ═══════════════════════════════════════════════════════════
function dampForce(rv, isComp, isRear) {
  // Single "damping gain / oil viscosity" per wheel scales BOTH comp and reb
  // (like changing the oil viscosity affects the whole damper).
  const gain    = isRear ? P.damp_r : P.damp_f;
  const lut     = isComp
    ? (isRear ? compLUT_R : compLUT_F)
    : (isRear ? rebLUT_R  : rebLUT_F);
  const F_MAX   = isRear ? F_MAX_R : F_MAX_F;
  const normV   = Math.abs(rv) / V_MAX_SIM;
  const frac    = evalCurveLUT(lut, normV);
  return gain * frac * F_MAX;
}

// ═══════════════════════════════════════════════════════════
//  REAR SWINGARM KINEMATICS  (chassis frame)
// ═══════════════════════════════════════════════════════════
// All positions here are in the chassis frame (m, relative to CoM, +x fwd, +y down).
// The swingarm rotates about the pivot by `phi`; the chassis pose is applied later
// only when converting to world/screen coordinates.

// Axle position (chassis frame) for a given swingarm angle.
function swAxleChassis(phi) {
  return {
    x: SW_PIV_X_FROM_COM - SWINGARM_L * Math.cos(phi),
    y: SW_PIV_Y_FROM_COM + SWINGARM_L * Math.sin(phi),
  };
}

// Shock length for a given swingarm angle — via the rocker linkage (lkSolve).
// The EOM consumes only shockLen(phi) and its derivative, so routing the shock
// through the linkage automatically yields the progressive (rising) rate.
function shockLength(phi) {
  return lkSolve(phi).shockLen;
}

// d(shockLength)/d(phi), central finite difference (rad).
function dShockLength(phi) {
  const h = 1e-4;
  return (shockLength(phi + h) - shockLength(phi - h)) / (2 * h);
}

// d(axle_y in CHASSIS frame)/d(phi) = L·cos(phi)  — chassis-frame vertical wheel rate.
function dAxleYchassis(phi) {
  return SWINGARM_L * Math.cos(phi);
}

// ═══════════════════════════════════════════════════════════
//  SIMULATION STEP  (sub-stepped for numerical stability)
// ═══════════════════════════════════════════════════════════
// Default tire spring ~300000 N/m, unsprung ~13kg → ω≈152 rad/s → Euler stable for dt<0.013s.
// Cap each sub-step at 0.005s → safe 2.6× margin.
const MAX_SUBSTEP = 0.005;  // seconds

function _physicsStep(dt_s) {
  const Ms  = getMsprung();
  const K_F = P.k_f * 1000;  // N/m
  const K_R = P.k_r * 1000;
  // Shock spring rate (N/m) calibrated so the WHEEL rate at sag equals K_R:
  //   wheel_rate = K_SHOCK / MR_sag²  ⇒  K_SHOCK = K_R · MR_sag².
  const K_SHOCK = K_R * SW_MR_SAG * SW_MR_SAG;

  // ── Gas / brake: ramp inputs then derive a_long from ACTUAL speed change ────
  // gasInput / brakeInput ramp 0→1 in 1.5 s when held, 1→0 in 0.5 s when released.
  // Multiplying by the ramp value makes the response feel progressive, not on/off.
  {
    // Sine ease-out ramp: input(t) = sin(π·t / 2T)
    //   d(input)/dt  = (π/2T) · cos(π·t/2T) = (π/2T) · √(1 − input²)
    // → rate is highest at the start and smoothly falls to zero at the limit.
    // The same curve applied to (1 − input) gives an ease-out release:
    // fast drop immediately, settles gently to zero.
    const K_UP   = (Math.PI / (2 * 0.75)) * dt_s;  // ramp up  in 0.75 s
    const K_DOWN = (Math.PI / (2 * 0.25)) * dt_s;  // ramp down in 0.25 s

    function sineRamp(val, k) {
      return Math.min(1, val + k * Math.sqrt(Math.max(0, 1 - val * val)));
    }
    if (gasPressed) {
      gasInput = sineRamp(gasInput, K_UP);
    } else {
      // ease-out on the inverted axis so release is fast-start, smooth-stop
      gasInput = 1 - sineRamp(1 - gasInput, K_DOWN);
    }
    if (brakePressed) {
      brakeInput = sineRamp(brakeInput, K_UP);
    } else {
      brakeInput = 1 - sineRamp(1 - brakeInput, K_DOWN);
    }

    const speedBefore = P.speed;
    const requested   = (GAS_ACCEL * gasInput) - (BRAKE_DECEL * brakeInput);
    if (gasInput > 0 || brakeInput > 0) {
      P.speed = Math.max(0, Math.min(160, P.speed + requested * dt_s * 3.6));
      const sl = document.getElementById('speed');
      if (sl) sl.value = Math.round(P.speed);
      const st = document.getElementById('lspeed');
      if (st) st.textContent = Math.round(P.speed) + ' km/h';
      const stStat = document.getElementById('st-speed');
      if (stStat) stStat.textContent = Math.round(P.speed);
    }
    // a_long = actual Δv/Δt in m/s² — zero when speed is pegged at min/max
    a_long = (P.speed - speedBefore) / dt_s / 3.6;
  }

  // ── Advance world X BEFORE computing wheel positions ─────────────────────
  // This keeps worldX_m and frontWheelX_m/rearWheelX_m on the same frame,
  // so w2sx() gives the correct screen X regardless of speed.
  const v_ground = P.speed / 3.6;
  worldX_m     += v_ground * dt_s;
  wheelAngle_f += (v_ground / WHEEL_R_F) * dt_s;
  wheelAngle_r += (v_ground / WHEEL_R_R) * dt_s;

  // ── Fork geometry: axis locked to chassis ─────────────────────────────────
  // Fork axis = RAKE_RAD - pitchAngle from world vertical, always.
  // Proper 2D rotation: chassis-frame fork vector (sin RAKE, cos RAKE) rotated by pitchAngle
  // gives world direction (sin(RAKE-pitch), cos(RAKE-pitch)).
  const φ_f  = RAKE_RAD - pitchAngle;
  const cosφ = Math.cos(φ_f);
  const sinφ = Math.sin(φ_f);
  const s_f  = REST_F_M + forkSlide_f;          // current fork length along axis

  // Steer head: full 2D rotation of chassis axis from CoM
  const cosP   = Math.cos(pitchAngle), sinP = Math.sin(pitchAngle);
  const comX_m = worldX_m - A_FRONT_M;
  const steerX = comX_m + A_FRONT_M * cosP;     // full cos for X
  const steerY = chassisY_m + A_FRONT_M * sinP; // full sin for Y
  frontWheelX_m = steerX + s_f * sinφ;          // wheel world X (derived, not integrated)
  frontWheelY_m = steerY + s_f * cosφ;          // wheel world Y (derived, not integrated)

  // ── Rear swingarm: wheel position from swingAngle (chassis-frame arc) ──────
  // The wheel is a point mass at the swingarm tip, rotating about the pivot.
  // Axle in chassis frame, then full 2-D rotation by pitch into world coords.
  const axle_xc = SW_PIV_X_FROM_COM - SWINGARM_L * Math.cos(swingAngle);  // chassis-frame X
  const axle_yc = SW_PIV_Y_FROM_COM + SWINGARM_L * Math.sin(swingAngle);  // chassis-frame Y
  rearWheelX_m = comX_m     + axle_xc * cosP - axle_yc * sinP;
  rearWheelY_m = chassisY_m + axle_xc * sinP + axle_yc * cosP;

  // ── Front fork spring & damper (along fork axis) ──────────────────────────
  // forkSlide_f < 0 → compressed → spring pushes wheel out (extends fork)
  let df   = forkSlide_f - P.pre_f;             // effective spring displacement
  let rv_f = vForkSlide_f;                       // relative velocity along fork axis

  if (df > TRAVEL_EXT)  { df = TRAVEL_EXT;  if (rv_f > 0) rv_f = 0; }
  if (df < -TRAVEL_MAX) { df = -TRAVEL_MAX; if (rv_f < 0) rv_f = 0; }

  // Linear coil rate.
  let f_spring_lin = K_F * df;                   // neg = compressed → pushes wheel out
  // Air-spring progression: deeper compression ramps up the effective rate (like an
  // air gap / progressive spring). 0% = pure linear; 100% = strong rising rate near bottom.
  // Modeled as an added rising force that grows with compression cubed.
  if (df < 0 && P.air_f > 0) {
    const xn = -df / TRAVEL_MAX;                  // 0..1 compression fraction
    f_spring_lin += -K_F * P.air_f * TRAVEL_MAX * 2.0 * (xn * xn * xn);
  }
  f_spring_F = f_spring_lin;

  const comp_f   = rv_f < 0;
  const fd_mag_f = rv_f !== 0 ? dampForce(rv_f, comp_f, false) : 0;
  f_damp_F = Math.sign(rv_f) * fd_mag_f;

  // ── Hydraulic bump stop (last BS_ZONE of compression travel) ───────────────
  // A stiff progressive spring plus velocity-dependent hydraulic damping that only
  // resists further compression — models the fork's end-stroke hydraulic lock.
  {
    const comp   = -df;                            // compression (m), >0
    const thresh = TRAVEL_MAX * (1 - BS_ZONE);
    if (comp > thresh) {
      const e = (comp - thresh) / (TRAVEL_MAX * BS_ZONE);  // 0..1 engagement
      f_spring_F += -K_F * BS_STIFF * (e * e) * (TRAVEL_MAX * BS_ZONE);  // push out
      if (rv_f < 0) f_damp_F += BS_DAMP * (e * e) * rv_f;                // resist compression
    }
  }
  const fsusp_f  = f_spring_F + f_damp_F;        // force along fork axis (neg = compressed)

  // ── Rear shock spring & damper (swingarm rotational DOF) ────────────────
  // The shock connects a fixed chassis mount to a swingarm-borne mount; its
  // length is a pure function of swingAngle, so spring/damper are driven via
  // virtual work. BOTH the spring AND the damper act in the shock and therefore
  // pass through the linkage's motion ratio, so both are progressive (rising rate):
  // their effective wheel-rate scales as 1/MR². The user sliders are calibrated to
  // mean the wheel-rate value AT SAG; the linkage adds the progression around that.
  //
  // Shock kinematics:
  shockLen_cur        = shockLength(swingAngle);
  const dShock        = dShockLength(swingAngle);          // m/rad, >0 (compression shortens shock)
  const wheelLeverY   = dAxleYchassis(swingAngle);         // = L·cosφ, chassis-frame wheel-vertical lever
  // Shock spring: K_shock is calibrated (initPhysics) so wheel rate at sag = P.k_r.
  // Preload P.pre_r is a wheel-mm offset; convert to an effective shock-length offset.
  const MR_sag        = SW_MR_SAG;                          // wheel-travel / shock-travel at sag
  const preShockLen   = P.pre_r / MR_sag;                    // m of extra shock compression from preload
  shockTravel_r       = (SHOCK_REST_LEN - shockLen_cur) + preShockLen;  // + = compressed
  const F_shock_sprg  = K_SHOCK * shockTravel_r;            // N along shock, + = compressed (pushes out)
  // Spring force referred to the wheel (chassis +y = down): compressed pushes wheel DOWN.
  const F_spring_wheel = F_shock_sprg * dShock / wheelLeverY;   // N, + = pushes wheel down (extends)

  // Damper — PROGRESSIVE, via the same motion ratio as the spring.
  // The damper is a shock element, so it responds to SHOCK velocity and its force
  // is referred back to the wheel through the linkage. Calibrating the user curve to
  // the wheel rate at sag, the physically correct transform is:
  //   F_damp_wheel = (MR_sag/MR) · curve( wheelVertRate · MR_sag/MR )
  // For a linear damper this makes the effective wheel-damping coefficient scale as
  // (MR_sag/MR)² — exactly like the spring rate — so the rear damps harder as it
  // compresses (MR drops toward bump) and softer toward droop. At sag MR=MR_sag ⇒
  // ratio 1 ⇒ identical to the old wheel-referenced behavior.
  const wheelVertRate = wheelLeverY * swingRate;            // m/s, chassis-rel wheel vel (+ = extend)
  rearSuspVel         = wheelVertRate;                       // expose for the velocity graph
  const MR_cur        = wheelLeverY / dShock;               // signed current motion ratio
  let   dampRatio     = MR_sag / MR_cur;                    // = MR_sag/MR (>0; signs cancel)
  dampRatio           = Math.max(0.3, Math.min(3.0, dampRatio)); // guard against extremes
  const v_eff         = wheelVertRate * dampRatio;          // shock-referenced damper velocity
  const comp_r        = v_eff < 0;                          // compressing = wheel moving up
  const fd_mag_r      = v_eff !== 0 ? dampForce(v_eff, comp_r, true) : 0;
  // Damper force on the wheel (+y down) opposes wheel motion, scaled by the ratio.
  const F_damp_wheel  = -Math.sign(v_eff) * fd_mag_r * dampRatio;

  // Net suspension force on the WHEEL (+y down); chassis feels the opposite.
  const F_wheel_susp  = F_spring_wheel + F_damp_wheel;
  // fsusp_r matches the OLD chassis convention (negative when compressed → supports chassis).
  const fsusp_r       = -F_wheel_susp;
  // Display copies (wheel-rate, same sign convention as before: negative = compressed/supporting).
  f_spring_R = -F_spring_wheel;
  f_damp_R   = -F_damp_wheel;

  // ── Tire springs ──────────────────────────────────────────────────────────
  const nat_f = calcNaturalWY_m(frontWheelX_m, WHEEL_R_F);
  const nat_r = calcNaturalWY_m(rearWheelX_m,  WHEEL_R_R);

  // Front tire: no penetration cap — full spring force drives fork compression,
  // which is required for the compression damper to see a velocity and respond.
  // Fork travel limits (TRAVEL_MAX) are the physical bound, not a force cap.
  const pen_f = Math.max(0, frontWheelY_m - nat_f);
  f_tire_F = pen_f > 0 ? -P.k_tire_f * pen_f : 0;

  // Rear tire spring — now safe to include in a_susp_r (see EOM below).
  // In the new chassis-relative DOF architecture, rv_r = vSuspR (not derived from
  // vRearWheel - v_rear_attach), so the tire spring force no longer contaminates
  // the damper velocity with pitchRate or vChassis jumps.
  // The tire spring is REQUIRED for suspension equilibrium: without it, a_susp_r
  // has a large extension bias (gravity + compressed spring both extend), which
  // fights the hard-floor constraint and causes chassis velocity build-up.
  {
    const pen_r_raw = rearWheelY_m - nat_r;
    const pen_r = Math.max(0, pen_r_raw);
    // No penetration cap — full spring stiffness prevents ground penetration while
    // allowing the EOM to respond naturally. Numerically stable at MAX_SUBSTEP=5ms
    // (Euler critical dt for this tire/swingarm system is ~16.5ms, 3.3× margin).
    // Light velocity-proportional damping suppresses the ~19 Hz tire resonance.
    const C_TIRE_R = 1500;   // N·s/m  tire contact damping (≈30% critical damping)
    const v_pen_r  = wheelLeverY * swingRate; // +ve = wheel extending (leaving ground)
    const f_tire_damp_r = pen_r > 0 ? -C_TIRE_R * v_pen_r : 0;
    f_tire_R = pen_r > 0 ? -P.k_tire_r * pen_r + f_tire_damp_r : 0;
  }

  // ── Chassis EOM ───────────────────────────────────────────────────────────
  // Fork force on chassis: the fork is tilted, so only the Y component of the
  // suspension force acts on chassis heave; the X component is absorbed by the
  // frame/steering geometry (chassis X isn't a free DOF in this sim).
  const fsusp_f_y  = fsusp_f * cosφ;            // Y component of fork force on chassis

  // Longitudinal acceleration input (gas / brake)
  // a_long > 0 = forward acceleration → inertia pushes CoM rearward → nose lifts (neg pitch)
  // a_long < 0 = braking            → inertia pushes CoM forward  → nose dives (pos pitch)
  const M_total    = 184 + P.mass;              // total vehicle mass (sprung + unsprung)
  const tau_long   = -M_total * a_long * H_COM; // pitch moment from long. accel (N·m)

  const a_chassis   = g + (fsusp_f_y + fsusp_r) / Ms;

  // ── Pitch EOM ─────────────────────────────────────────────────────────────
  // Suspension pitch moment: each wheel's vertical force × its moment arm from CoM.
  // Front suspension acts at A_FRONT_M ahead of CoM; rear at B_REAR_M behind CoM.
  // Positive tau_susp = nose-up (front pushes chassis up relative to rear).
  const tau_susp  = A_FRONT_M * fsusp_f_y - B_REAR_M * fsusp_r;
  // Pitch damping: limits pitchRate to physically realistic values.
  // At 40 N·m·s/rad, pitchRate can reach ~2.4 rad/s (137°/s) over bumps — too high.
  // Real motorcycles stay below ~1 rad/s in normal riding; 100 N·m·s/rad achieves this
  // while still allowing meaningful nose-dive under braking and squat under acceleration.
  const C_PITCH_DRAG = 100; // N·m·s/rad
  const alpha_pitch = (tau_susp + tau_long - C_PITCH_DRAG * pitchRate) / I_YY;

  // ── Fork slide EOM (chassis-relative DOF along fork axis) ─────────────────
  // Forces along fork axis on the unsprung wheel mass:
  //   gravity component: M_UNSPRUNG_F * g * cosφ  (extends fork)
  //   spring+damper:    -fsusp_f                   (compressed → pushes wheel out)
  //   tire projection:   f_tire_F * cosφ           (upward tire force, projected)
  // Fork EOM: unsprung wheel mass along fork axis (chassis-relative DOF).
  // Use simple uncoupled form — the chassis inertial coupling term caused the
  // fork to appear to rotate opposite the chassis during pitch events.
  const a_fork = g * cosφ
               - fsusp_f / P.m_unsprung_f
               + f_tire_F * cosφ / P.m_unsprung_f;

  // ── Rear swingarm rotational EOM (about the pivot) ──────────────────────
  // The wheel is a point mass at the swingarm tip. We sum generalized forces
  // (torques) about the pivot for the swingAngle DOF:
  //   I_sw·α = Q_grav_eff + Q_tire + Q_susp
  // Each vertical force on the wheel maps to a torque via the wheel lever
  // (L·cosφ = dAxleY/dφ in the chassis frame).
  //
  // EFFECTIVE GRAVITY (g − a_chassis): the pivot accelerates with the chassis,
  // so in the chassis (non-inertial) frame the wheel feels gravity reduced by the
  // chassis vertical acceleration. Airborne, a_chassis ≈ g ⇒ effective gravity ≈ 0
  // ⇒ the swingarm does NOT droop in free-fall (both masses fall together). On the
  // ground, a_chassis ≈ 0 ⇒ full gravity. This physically replaces the old
  // "airborne reduced-mass" hack and prevents the g-driven velocity buildup that
  // caused the landing spike. a_chassis is already computed above (feed-forward,
  // no circular dependency since it depends on fsusp_r, not on α_sw).
  const I_sw   = P.m_unsprung_r * SWINGARM_L * SWINGARM_L + I_SWINGARM;
  const Q_grav = P.m_unsprung_r * (g - a_chassis) * wheelLeverY; // + = droop (extend)
  const Q_tire = f_tire_R * wheelLeverY;                          // f_tire_R<0 (up) ⇒ compress
  const Q_susp = F_wheel_susp * wheelLeverY;                      // + = extend (compressed shock)
  const alpha_sw = (Q_grav + Q_tire + Q_susp) / I_sw;             // rad/s²

  // ── Integrate (explicit Euler) ────────────────────────────────────────────
  vChassis     += a_chassis   * dt_s;
  pitchRate    += alpha_pitch * dt_s;
  chassisY_m   += vChassis    * dt_s;
  pitchAngle   += pitchRate   * dt_s;


  vForkSlide_f += a_fork      * dt_s;
  forkSlide_f  += vForkSlide_f * dt_s;

  // Swingarm EOM — integrate unconditionally (same as the front fork).
  // The tire spring Q_tire is the contact force; it prevents ground penetration
  // and naturally allows the wheel to bounce off bumps. Gating to airborne only
  // (the old approach) bypassed the unsprung-mass dynamics and glued the wheel
  // kinematically to the terrain, killing the wheel-mass behaviour the user sees.
  swingRate  += alpha_sw * dt_s;
  swingAngle += swingRate * dt_s;

  // ── Fork travel limits (direct DOF clamp — no positional correction needed) ─
  if (forkSlide_f > TRAVEL_EXT) {
    forkSlide_f = TRAVEL_EXT;
    if (vForkSlide_f > 0) vForkSlide_f = 0;
  } else if (forkSlide_f < -TRAVEL_MAX) {
    forkSlide_f = -TRAVEL_MAX;
    if (vForkSlide_f < 0) {
      // Bottom-out: transfer Y-axis momentum from wheel to chassis before zeroing
      // relative velocity (prevents chassis continuing to compress into the stop).
      // Δv_chassis = m_uf / (Ms + m_uf) * (vForkSlide_f · cosφ)
      // vForkSlide_f < 0 and cosφ > 0, so Δv is upward (negative Y) — correct.
      // Also impart a nose-up pitch impulse: impact at A_FRONT_M ahead of CoM.
      const delta_v_co = P.m_unsprung_f * vForkSlide_f * cosφ / (Ms + P.m_unsprung_f);
      vChassis  += delta_v_co;
      pitchRate += delta_v_co * Ms * A_FRONT_M / I_YY;
      vForkSlide_f = 0;
    }
  }

  // ── Swingarm angle mechanical limits ────────────────────────────────────
  if (swingAngle > PHI_FULL_DROOP) {
    // Top-out (full droop / rebound stop). Clamp the angle but DO NOT zero
    // swingRate: the (now extended) shock spring pulls the swingarm back over a
    // few ms, giving a smooth velocity curve instead of an instantaneous step —
    // the rotational analog of the liftoff-spike fix.
    swingAngle = PHI_FULL_DROOP;
  } else if (swingAngle < PHI_FULL_BUMP) {
    // Bottom-out (hard bump stop). Transfer the wheel's vertical momentum to the
    // chassis and arrest the swingarm — real bottoming is an abrupt event.
    swingAngle = PHI_FULL_BUMP;
    if (swingRate < 0) {
      vChassis += P.m_unsprung_r * (wheelLeverY * swingRate) / (Ms + P.m_unsprung_r);
      swingRate = 0;
    }
  }

  // Wheel vertical travel from the unloaded rest angle (+ = compressed).
  wheelTravel_r = SWINGARM_L * (Math.sin(PHI_REST) - Math.sin(swingAngle));

  // Save display forces (disp_f negative = compressed = travel used)
  disp_f = df;
  disp_r = -wheelTravel_r;   // negative = compressed (same display convention as before)

  // ── Recompute derived front wheel world position after all corrections ─────
  // No hard-floor snap here: the tire spring drives fork compression naturally,
  // which produces vForkSlide_f < 0 and activates the compression damper.
  // A hard floor would bypass that velocity, making the comp damper invisible.
  {
    const φ2   = RAKE_RAD - pitchAngle;
    const cP2  = Math.cos(pitchAngle), sP2 = Math.sin(pitchAngle);
    const stX2 = (worldX_m - A_FRONT_M) + A_FRONT_M * cP2;
    const stY2 = chassisY_m + A_FRONT_M * sP2;
    frontWheelX_m = stX2 + (REST_F_M + forkSlide_f) * Math.sin(φ2);
    frontWheelY_m = stY2 + (REST_F_M + forkSlide_f) * Math.cos(φ2);
  }

  // ── Rear wheel world position from swingAngle (physics-driven, no snap) ────
  // Like the front fork, contact is handled entirely by the tire spring (f_tire_R
  // above), which was computed from the PREVIOUS sub-step's wheel position.  No
  // position snap or kinematic rate assignment: those approaches overrode the EOM
  // and erased the unsprung-mass dynamics. rearContact is used only for the AIR
  // indicator and effective-gravity term in the next sub-step.
  {
    const _cosP2 = Math.cos(pitchAngle), _sinP2 = Math.sin(pitchAngle);
    const _comX  = worldX_m - A_FRONT_M;
    const ax_c   = SW_PIV_X_FROM_COM - SWINGARM_L * Math.cos(swingAngle);
    const ay_c   = SW_PIV_Y_FROM_COM + SWINGARM_L * Math.sin(swingAngle);
    rearWheelX_m = _comX      + ax_c * _cosP2 - ay_c * _sinP2;
    rearWheelY_m = chassisY_m + ax_c * _sinP2 + ay_c * _cosP2;
    // Contact flag: wheel centre is within 5 mm of the natural ground contact point.
    const nat_r2 = calcNaturalWY_m(rearWheelX_m, WHEEL_R_R);
    rearContact  = rearWheelY_m >= nat_r2 - 0.005;
  }

  // Gas / brake: update speed and resolve a_long
}

function simStep(dt_s) {
  // Split frame dt into sub-steps small enough for Euler stability
  const n   = Math.max(1, Math.ceil(dt_s / MAX_SUBSTEP));
  const sub = dt_s / n;
  for (let i = 0; i < n; i++) _physicsStep(sub);
}

// ═══════════════════════════════════════════════════════════
//  WHEEL DRAWING
// ═══════════════════════════════════════════════════════════
function drawWheel(cx, cy, r_px, rotAngle) {
  // Tire section width ≈ 27% of total radius (realistic for 120/70 & 180/55 R17)
  const rimR = r_px - Math.round(r_px * 0.27);

  // Solid tire donut — outer contact edge is clearly the full radius r_px
  ctx.beginPath();
  ctx.arc(cx, cy, r_px, 0, Math.PI * 2, false);   // outer circle CW
  ctx.arc(cx, cy, rimR, 0, Math.PI * 2, true);     // inner cutout CCW → creates donut
  ctx.fillStyle = '#1c1c1c';
  ctx.fill();
  // Tire sidewall highlight ring
  ctx.beginPath(); ctx.arc(cx, cy, r_px, 0, Math.PI * 2);
  ctx.strokeStyle = '#b8b8b8'; ctx.lineWidth = 1.5; ctx.stroke();
  // Inner tire edge
  ctx.beginPath(); ctx.arc(cx, cy, rimR, 0, Math.PI * 2);
  ctx.strokeStyle = '#3a3a3a'; ctx.lineWidth = 1; ctx.stroke();

  // Rim face (filled silver-grey)
  ctx.beginPath(); ctx.arc(cx, cy, rimR, 0, Math.PI * 2);
  ctx.fillStyle = '#4e4e4e'; ctx.fill();
  ctx.strokeStyle = '#888'; ctx.lineWidth = 2; ctx.stroke();

  // Spokes — rotated by rolling angle
  ctx.save();
  ctx.translate(cx, cy);
  ctx.rotate(rotAngle || 0);
  ctx.strokeStyle = '#606060'; ctx.lineWidth = 1.5;
  for (let i = 0; i < 8; i++) {
    const a = i / 8 * Math.PI * 2;
    ctx.beginPath();
    ctx.moveTo(Math.cos(a) * 5, Math.sin(a) * 5);
    ctx.lineTo(Math.cos(a) * rimR, Math.sin(a) * rimR);
    ctx.stroke();
  }
  ctx.restore();

  // Hub (drawn after restore so it's always centered, not rotated)
  ctx.beginPath(); ctx.arc(cx, cy, 7, 0, Math.PI * 2);
  ctx.fillStyle = '#888'; ctx.fill();
  ctx.beginPath(); ctx.arc(cx, cy, 3, 0, Math.PI * 2);
  ctx.fillStyle = '#ccc'; ctx.fill();
}

// ═══════════════════════════════════════════════════════════
//  SCREEN COORDINATE HELPERS
// ═══════════════════════════════════════════════════════════
let camY_m = 0;   // smoothed camera Y reference — follows terrain, not the bike's bounce

function screenY(y_m) {
  // Camera tracks X only; Y is fixed to camY_m so the bike's heave is visible on screen.
  // Ground reference sits at 70% down the canvas; bike floats above it.
  return (y_m - camY_m) * PM + canvas.height * 0.70;
}
function screenLen(d_m) { return d_m * PM; }

// ═══════════════════════════════════════════════════════════
//  MAIN DRAW LOOP
// ═══════════════════════════════════════════════════════════
function draw(ts) {
  requestAnimationFrame(draw);

  const W = canvas.width, H = canvas.height;
  let dt = 0;
  if (lastTs !== null) dt = Math.min((ts-lastTs)/1000, 0.025);
  lastTs = ts;

  if (!initialized) { initPhysics(); }

  if (dt > 0) {
    const dt_s = dt * P.timeScale;
    simStep(dt_s);

    // Force history
    hist.fs.push(f_spring_F);   hist.fs.shift();
    hist.fd.push(f_damp_F);    hist.fd.shift();
    hist.rs.push(f_spring_R);   hist.rs.shift();
    hist.rd.push(f_damp_R);    hist.rd.shift();
    hist.fv.push(vForkSlide_f); hist.fv.shift();
    hist.rv.push(rearSuspVel);  hist.rv.shift();
  }

  // ── Stats ─────────────────────────────────────────────────
  // Travel used = compression amount (negative disp = compressed, show as positive mm)
  const travF_mm = Math.round(-disp_f * 1000);
  const travR_mm = Math.round(-disp_r * 1000);
  document.getElementById('st-ft').textContent    = travF_mm;
  document.getElementById('st-rt').textContent    = travR_mm;
  document.getElementById('st-pitch').textContent = (pitchAngle*180/Math.PI).toFixed(1);
  document.getElementById('st-fspring').textContent = Math.round(Math.abs(f_spring_F));
  document.getElementById('st-fdamp').textContent   = Math.round(Math.abs(f_damp_F));

  // ── Clear & sky ───────────────────────────────────────────
  ctx.fillStyle='#d0d0d0'; ctx.fillRect(0,0,W,H);
  ctx.fillStyle='#c0c8d4'; ctx.fillRect(0,0,W,H*0.5);

  // ── Screen coordinate helpers ─────────────────────────────
  // Chassis CoM is at a fixed screen X; everything is rendered relative to it.
  const comSX    = COM_SX();                        // CoM fixed screen X
  const comX_m_d = worldX_m - A_FRONT_M;           // CoM world X

  // World-X → screen-X (CoM-relative)
  const w2sx = wx => comSX + (wx - comX_m_d) * PM;

  // ── Ground ────────────────────────────────────────────────
  ctx.beginPath();
  for (let px = 0; px <= W; px += 3) {
    const wx_m  = comX_m_d + (px - comSX) / PM;    // world X for this screen pixel
    const gy_m  = groundY_m(wx_m);
    const sy_px = screenY(gy_m);
    px === 0 ? ctx.moveTo(px, sy_px) : ctx.lineTo(px, sy_px);
  }
  ctx.lineTo(W, H); ctx.lineTo(0, H); ctx.closePath();
  ctx.fillStyle='#4a4a4a'; ctx.fill();
  ctx.strokeStyle='#e11d48'; ctx.lineWidth=10; ctx.stroke();

  // ── Camera Y: very slow drift toward mean terrain height (~10 s time constant) ─────
  // Individual bumps do NOT move the camera — only long-term elevation changes do.
  // This keeps the terrain visually stable while the bike bounces above it.
  camY_m += (groundY_m(comX_m_d) - camY_m) * 0.003;

  // ── Kinematic screen positions (chassis-relative) ─────────
  // These use the X positions computed in the physics step from fork/swingarm geometry.

  // Chassis CoM screen Y — computed early so all body-fixed points can use it
  const comX    = comSX;
  const comY    = screenY(chassisY_m);

  // Chassis rotation (for all body-fixed point positions)
  const cosP_d = Math.cos(pitchAngle), sinP_d = Math.sin(pitchAngle);

  // Steering head: full 2D rotation of A_FRONT_M along chassis axis from CoM
  const steerX    = comSX + A_FRONT_M * cosP_d * PM;
  const steerY_px = comY  + A_FRONT_M * sinP_d * PM;

  // Front wheel screen position (frontWheelX/Y already use full rotation from physics)
  const fwX_px = w2sx(frontWheelX_m);
  const fwY_px = screenY(frontWheelY_m);

  // Swingarm pivot: full 2D rotation of chassis-frame offset (SW_PIV_X, SW_PIV_Y) from CoM
  const swPivotX = comSX + (SW_PIV_X_FROM_COM * cosP_d - SW_PIV_Y_FROM_COM * sinP_d) * PM;
  const swPivotY = comY  + (SW_PIV_X_FROM_COM * sinP_d + SW_PIV_Y_FROM_COM * cosP_d) * PM;

  // Rear wheel screen position (from kinematic rearWheelX_m)
  const rwX_px = w2sx(rearWheelX_m);
  const rwY_px = screenY(rearWheelY_m);

  // Chassis body
  const angle   = pitchAngle;

  // Scale factor so chassis vertices (sized for PM=200) render correctly at any PM
  const sc = PM / 200;

  // ── Rear wheel (behind swingarm and chassis) ─────────────
  drawWheel(rwX_px, rwY_px, Math.round(WHEEL_R_R*PM), wheelAngle_r);

  // ── Swingarm (in front of rear wheel) ────────────────────
  ctx.strokeStyle='#111'; ctx.lineWidth=11*sc; ctx.lineCap='round';
  ctx.beginPath(); ctx.moveTo(swPivotX, swPivotY); ctx.lineTo(rwX_px, rwY_px); ctx.stroke();
  ctx.strokeStyle='#484848'; ctx.lineWidth=7*sc;
  ctx.beginPath(); ctx.moveTo(swPivotX, swPivotY); ctx.lineTo(rwX_px, rwY_px); ctx.stroke();
  ctx.strokeStyle='#5a5a5a'; ctx.lineWidth=3*sc;
  ctx.beginPath(); ctx.moveTo(swPivotX, swPivotY); ctx.lineTo(rwX_px, rwY_px); ctx.stroke();

  // ── Front wheel (behind fork so fork travel is visible) ───
  drawWheel(fwX_px, fwY_px, Math.round(WHEEL_R_F*PM), wheelAngle_f);

  // ── Chassis (motorcycle frame) pitched ───────────────────
  ctx.save();
  ctx.translate(comX, comY);
  ctx.rotate(angle);
  ctx.scale(sc, sc);   // chassis vertices are in PM=200 local-px; scale to current PM

  // Frame vertices in chassis-local px (CoM=0,0, +x=forward/right, +y=down).
  // Derived from user SVG (viewBox 0 0 2194 1256).
  // Uniform scale 0.179. Mapping: SVG(179,218)→chassis(-137,-86), SVG(1745,474)→chassis(143,-40).
  // offset_x = svg_x*0.179 - chassis_x → 179*0.179+137 = 169.0
  // offset_y = svg_y*0.179 - chassis_y → 218*0.179+86 = 125.0
  // chassis_x = svg_x*0.179 - 169,  chassis_y = svg_y*0.179 - 125
  // Frame bottom (y=57) sits ~300 mm above tire contact.
  const fv = [
    [-137, -86],  // A: (179,218)   rear tail upper
    [ -78, -85],  // B: (508,225)   rear upper spar
    [ -57, -66],  // C: (626,331)   seat saddle / lower spar junction
    [   5, -71],  // D: (975,302)   mid-frame
    [  45, -99],  // E: (1199,144)  upper spar peak
    [  92,-104],  // F: (1456,115)  head tube top-left
    [ 119, -90],  // G: (1610,195)  head tube right
    [ 143, -40],  // H: (1745,474)  fork crown / steer-head lower (aligns with SHx)
    [  95,  57],  // I: (1474,1017) gearbox bottom right
    [   9,  57],  // J: (1001,1017) gearbox bottom left
    [   9,  27],  // K: (1001, 849) vertical section top
    [ -18,  -7],  // L: ( 849, 655) diagonal ↔ vertical transition
  ];

  // ── Frame body (filled polygon) ──────────────────────────────────────
  const fg = ctx.createLinearGradient(0, -104, 0, 57);
  fg.addColorStop(0,   '#404040');
  fg.addColorStop(0.4, '#2e2e2e');
  fg.addColorStop(1,   '#1a1a1a');

  ctx.beginPath();
  fv.forEach(([x, y], i) => i === 0 ? ctx.moveTo(x, y) : ctx.lineTo(x, y));
  ctx.closePath();
  ctx.fillStyle = fg;
  ctx.fill();

  // Outer edge stroke
  ctx.strokeStyle = '#585858'; ctx.lineWidth = 1.5;
  ctx.stroke();

  // ── Engine block (sits inside the frame polygon) ─────────────────────
  const eL = -18, eR = 70, eT = -55, eB = 15;
  ctx.fillStyle = '#0d0d1f'; ctx.strokeStyle = '#1e1e3a'; ctx.lineWidth = 1.5;
  ctx.beginPath(); ctx.roundRect(eL, eT, eR-eL, eB-eT, 4); ctx.fill(); ctx.stroke();
  // Cylinder fins
  ctx.strokeStyle = '#181832'; ctx.lineWidth = 1.5;
  for (let fy = eT+9; fy < eB-2; fy += 8) {
    ctx.beginPath(); ctx.moveTo(eL+3, fy); ctx.lineTo(eR-3, fy); ctx.stroke();
  }
  // Cylinder head face (right/front side)
  ctx.fillStyle = '#12122a';
  ctx.beginPath(); ctx.roundRect(eR-16, eT, 16, eB-eT, [0,4,4,0]); ctx.fill();

  // ── Edge highlights for depth ─────────────────────────────────────────
  ctx.lineCap = 'round';

  // Upper spar: rear tail → seat saddle → mid-frame → upper peak → head tube top
  ctx.strokeStyle = '#606060'; ctx.lineWidth = 1.5;
  ctx.beginPath();
  ctx.moveTo(-137,-86); ctx.lineTo(-78,-85);
  ctx.lineTo(-57,-66);  ctx.lineTo(5,-71);
  ctx.lineTo(45,-99);   ctx.lineTo(92,-104);
  ctx.stroke();

  // Right face highlight: head tube top → head tube right → fork crown
  ctx.strokeStyle = '#4e4e4e'; ctx.lineWidth = 1.5;
  ctx.beginPath(); ctx.moveTo(92,-104); ctx.lineTo(119,-90); ctx.lineTo(143,-40); ctx.stroke();

  // Lower surface: fork crown → gearbox bottom right → bottom left → vertical up → diagonal
  ctx.strokeStyle = '#1e1e1e'; ctx.lineWidth = 1;
  ctx.beginPath();
  ctx.moveTo(143,-40); ctx.lineTo(95,57);
  ctx.lineTo(9,57);    ctx.lineTo(9,27); ctx.lineTo(-18,-7);
  ctx.stroke();

  // ── Head tube highlight (fork connects here) ──────────────────────────
  ctx.strokeStyle = '#3a3a3a'; ctx.lineWidth = 10;
  ctx.beginPath(); ctx.moveTo(92,-104); ctx.lineTo(119,-90); ctx.stroke();
  ctx.strokeStyle = '#aaa'; ctx.lineWidth = 5;
  ctx.beginPath(); ctx.moveTo(92,-104); ctx.lineTo(119,-90); ctx.stroke();
  ctx.strokeStyle = '#e0e0e0'; ctx.lineWidth = 2;
  ctx.beginPath(); ctx.moveTo(92,-104); ctx.lineTo(119,-90); ctx.stroke();

  // ── MT-07 label ───────────────────────────────────────────────────────
  ctx.fillStyle = '#e11d48'; ctx.font = 'bold 8px sans-serif'; ctx.textAlign = 'center';
  ctx.fillText('MT-07', -40, -40);

  ctx.restore();

  // ── Rear linkage + coil-over shock (animated) ────────────────────────
  // Drawn after the chassis body so the whole assembly is visible. Renders the
  // full Pro-Link-style path: swingarm → tie-rod → rocker (bell crank) → shock →
  // frame. Joint positions come from the same lkSolve() the physics uses, so the
  // animation is exactly consistent with the rising-rate behavior.
  {
    // Chassis-frame → screen helper (same transform as the swingarm pivot).
    const c2s = (cx, cy) => [comSX + (cx * cosP_d - cy * sinP_d) * PM,
                             comY  + (cx * sinP_d + cy * cosP_d) * PM];
    const lk = lkSolve(swingAngle);
    const [pX, pY] = c2s(LK.pivX, LK.pivY);     // rocker pivot
    const [aX, aY] = c2s(lk.Ax, lk.Ay);         // tie-rod ↔ swingarm
    const [bX2, bY2] = c2s(lk.Bx, lk.By);       // tie-rod ↔ rocker
    const [cX, cY] = c2s(lk.Cx, lk.Cy);         // rocker ↔ shock
    // Use the VISUAL frame mount so the drawn coil-over shortens on compression
    // (the physics mount, SHOCK_UP, lengthens on compression — see SHOCK_VIS note).
    const [dX, dY] = c2s(SHOCK_VIS_X, SHOCK_VIS_Y); // shock ↔ frame (visual)
    ctx.lineCap = 'round'; ctx.lineJoin = 'round';

    // Tie-rod (swingarm A → rocker B): slim steel link.
    ctx.strokeStyle = '#0d0d0d'; ctx.lineWidth = 6 * sc;
    ctx.beginPath(); ctx.moveTo(aX, aY); ctx.lineTo(bX2, bY2); ctx.stroke();
    ctx.strokeStyle = '#5a5a5a'; ctx.lineWidth = 2.5 * sc;
    ctx.beginPath(); ctx.moveTo(aX, aY); ctx.lineTo(bX2, bY2); ctx.stroke();

    // Rocker (bell crank): filled triangle pivot–B–C.
    ctx.beginPath(); ctx.moveTo(pX, pY); ctx.lineTo(bX2, bY2); ctx.lineTo(cX, cY); ctx.closePath();
    ctx.fillStyle = '#2c2c2c'; ctx.fill();
    ctx.strokeStyle = '#5a5a5a'; ctx.lineWidth = 1.5 * sc; ctx.stroke();

    // Coil-over shock (rocker C → frame D): damper body near the frame, coil along
    // the lower portion. The coil bunches as the shock compresses (shockTravel_r).
    const dx = cX - dX, dy = cY - dY;
    const len = Math.hypot(dx, dy) || 1;
    const nx = dx / len, ny = dy / len;          // unit along shock (frame→rocker)
    const ppx = -ny, ppy = nx;
    const bx0 = dX + nx * len * 0.36, by0 = dY + ny * len * 0.36;  // body end
    ctx.strokeStyle = '#141414'; ctx.lineWidth = 9 * sc;
    ctx.beginPath(); ctx.moveTo(dX, dY); ctx.lineTo(bx0, by0); ctx.stroke();
    ctx.strokeStyle = '#3a3a3a'; ctx.lineWidth = 4.5 * sc;
    ctx.beginPath(); ctx.moveTo(dX, dY); ctx.lineTo(bx0, by0); ctx.stroke();

    const coils = 6, amp = 5.5 * sc, segs = coils * 8;
    const tf = Math.max(0, Math.min(1, wheelTravel_r / TRAVEL_MAX));   // compression fraction
    ctx.strokeStyle = `hsl(${350 - tf * 20},${60 + tf * 40}%,${42 + tf * 13}%)`;
    ctx.lineWidth = 2.5 * sc;
    ctx.beginPath();
    for (let i = 0; i <= segs; i++) {
      const t  = i / segs;
      const bx = bx0 + nx * (len * 0.64) * t;
      const by = by0 + ny * (len * 0.64) * t;
      const off = Math.sin(t * Math.PI * 2 * coils) * amp;
      const sx = bx + ppx * off, sy = by + ppy * off;
      i === 0 ? ctx.moveTo(sx, sy) : ctx.lineTo(sx, sy);
    }
    ctx.stroke();

    // Pivot + joint eyes.
    ctx.fillStyle = '#1a1a1a';
    for (const [jx, jy, r] of [[pX,pY,4.5],[aX,aY,3.5],[bX2,bY2,3.5],[cX,cY,3.5],[dX,dY,4]]) {
      ctx.beginPath(); ctx.arc(jx, jy, r * sc, 0, Math.PI * 2); ctx.fill();
    }
    ctx.fillStyle = '#666';
    ctx.beginPath(); ctx.arc(pX, pY, 2 * sc, 0, Math.PI * 2); ctx.fill();
  }

  // ── Fork tube (×2 length — stanchion extends above steer head) ──────
  // Fork direction from steer head toward wheel (screen coords)
  const forkDX  = fwX_px - steerX;
  const forkDY  = fwY_px - steerY_px;
  // Fixed-length stanchion above steer head (does not change with travel)
  const forkLen  = Math.sqrt(forkDX*forkDX + forkDY*forkDY);
  const fNX = forkDX/forkLen, fNY = forkDY/forkLen;   // unit vector along fork axis
  const stanchPx = Math.round(REST_F_M * PM);          // 90 px — constant
  const ufTopX   = steerX    - fNX * stanchPx;
  const ufTopY   = steerY_px - fNY * stanchPx;

  ctx.lineCap = 'round';

  // ── Upper stanchion (shiny chrome tube above triple clamp) ───────────
  // Outer shadow
  ctx.strokeStyle = '#111'; ctx.lineWidth = 16*sc;
  ctx.beginPath(); ctx.moveTo(ufTopX, ufTopY); ctx.lineTo(steerX, steerY_px); ctx.stroke();
  // Main chrome tube
  ctx.strokeStyle = '#888'; ctx.lineWidth = 10*sc;
  ctx.beginPath(); ctx.moveTo(ufTopX, ufTopY); ctx.lineTo(steerX, steerY_px); ctx.stroke();
  // Highlight stripe
  ctx.strokeStyle = '#ddd'; ctx.lineWidth = 3*sc;
  ctx.beginPath(); ctx.moveTo(ufTopX, ufTopY); ctx.lineTo(steerX, steerY_px); ctx.stroke();

  // ── Lower slider tube (darker alloy, from triple clamp to axle) ──────
  ctx.strokeStyle = '#111'; ctx.lineWidth = 16*sc;
  ctx.beginPath(); ctx.moveTo(steerX, steerY_px); ctx.lineTo(fwX_px, fwY_px); ctx.stroke();
  ctx.strokeStyle = '#3a3a3a'; ctx.lineWidth = 10*sc;
  ctx.beginPath(); ctx.moveTo(steerX, steerY_px); ctx.lineTo(fwX_px, fwY_px); ctx.stroke();
  // Slider highlight
  ctx.strokeStyle = '#525252'; ctx.lineWidth = 4*sc;
  ctx.beginPath(); ctx.moveTo(steerX, steerY_px); ctx.lineTo(fwX_px, fwY_px); ctx.stroke();

  // ── Fork spring zigzag (on slider section, shows travel) ─────────────
  const nSegs = 14, sAmp = 6*sc;
  const sliderMidX = steerX + forkDX * 0.50;
  const sliderMidY = steerY_px + forkDY * 0.50;
  const travelFrac_F = Math.max(0, Math.min(1, (-disp_f + TRAVEL_MAX * 0.5) / TRAVEL_MAX));
  const springColor  = `hsl(${350 - travelFrac_F*20},${60+travelFrac_F*40}%,${30+travelFrac_F*20}%)`;
  ctx.strokeStyle = springColor; ctx.lineWidth = 2;
  ctx.beginPath();
  for (let i = 0; i <= nSegs*4; i++) {
    const tt  = i / (nSegs*4);
    const py  = steerY_px + forkDY * tt;
    const px2 = steerX    + forkDX * tt + Math.sin(tt * Math.PI*2*nSegs) * sAmp;
    i === 0 ? ctx.moveTo(px2, py) : ctx.lineTo(px2, py);
  }
  ctx.stroke();

  // (Front wheel drawn before fork — see above)

  // ── AIR indicators ────────────────────────────────────────
  ctx.font='bold 10px sans-serif';
  if (f_tire_F===0) {
    ctx.fillStyle='#e11d48'; ctx.textAlign='left';
    ctx.fillText('AIR', fwX_px+Math.round(WHEEL_R_F*PM)+5, fwY_px+4);
  }
  if (!rearContact) {
    ctx.fillStyle='#e11d48'; ctx.textAlign='right';
    ctx.fillText('AIR', rwX_px-Math.round(WHEEL_R_R*PM)-5, rwY_px+4);
  }

  // ── Travel bar (right edge) ───────────────────────────────
  const bx   = W-22, bTop=16, bHt=H*0.55;
  ctx.fillStyle='#1a1a1a';
  ctx.beginPath(); ctx.roundRect(bx, bTop, 12, bHt, 6); ctx.fill();

  // Travel bars — fill fraction 0=extended, 1=fully compressed
  // Color: white at midtravel, red at extremes
  function travelBarColor(frac) {
    const ext = Math.abs(frac - 0.5) * 2;  // 0=mid, 1=extreme
    const r = Math.round(255);
    const g = Math.round(255 * (1 - ext));
    const b = Math.round(255 * (1 - ext));
    return `rgb(${r},${g},${b})`;
  }

  // Front travel bar
  const fFrac = Math.max(0, Math.min(1, (-disp_f+TRAVEL_EXT)/(TRAVEL_MAX+TRAVEL_EXT)));
  ctx.fillStyle = travelBarColor(fFrac);
  ctx.beginPath(); ctx.roundRect(bx, bTop, 12, fFrac*bHt, 6); ctx.fill();
  ctx.fillStyle='#444'; ctx.font='9px sans-serif'; ctx.textAlign='center';
  ctx.fillText('F', bx+6, bTop-5);

  // Rear travel bar
  const bx2   = W-38;
  ctx.fillStyle='#1a1a1a';
  ctx.beginPath(); ctx.roundRect(bx2, bTop, 12, bHt, 6); ctx.fill();
  const rFrac = Math.max(0, Math.min(1, (-disp_r+TRAVEL_EXT)/(TRAVEL_MAX+TRAVEL_EXT)));
  ctx.fillStyle = travelBarColor(rFrac);
  ctx.beginPath(); ctx.roundRect(bx2, bTop, 12, rFrac*bHt, 6); ctx.fill();
  ctx.fillStyle='#444'; ctx.font='9px sans-serif'; ctx.textAlign='center';
  ctx.fillText('R', bx2+6, bTop-5);

  drawForceGraph();
  drawVelocityGraph();
}

// ═══════════════════════════════════════════════════════════
//  FORCE HISTORY GRAPH
// ═══════════════════════════════════════════════════════════
const fg    = document.getElementById('fgraph');
const fgctx = fg.getContext('2d');

function resizeFG() { if (fg.clientWidth) fg.width = fg.clientWidth; }
window.addEventListener('resize', resizeFG);

function drawForceGraph() {
  const W=fg.width, H=fg.height;
  if (!W||!H) return;
  const fgScale = document.getElementById('fgraph-scale');
  const YF_MAX = 8000 * (fgScale ? fgScale.value / 100 : 1);

  fgctx.fillStyle='#0a0a0a'; fgctx.fillRect(0,0,W,H);

  // Grid
  fgctx.strokeStyle='#1a1a1a'; fgctx.lineWidth=1;
  for (let i=0; i<=4; i++) {
    const y=H*i/4;
    fgctx.beginPath(); fgctx.moveTo(0,y); fgctx.lineTo(W,y); fgctx.stroke();
  }
  // Zero line — thicker and brighter so it reads against the dark background
  const zy=H*0.5;
  fgctx.strokeStyle='#484848'; fgctx.lineWidth=2;
  fgctx.beginPath(); fgctx.moveTo(0,zy); fgctx.lineTo(W,zy); fgctx.stroke();

  // Y axis labels (inverted: compression is positive up on screen)
  fgctx.fillStyle='#555'; fgctx.font='9px sans-serif'; fgctx.textAlign='left';
  const fLabel = YF_MAX>=1000 ? `${(YF_MAX/1000).toFixed(1)}kN` : `${Math.round(YF_MAX)}N`;
  fgctx.fillText(`-${fLabel}`,2,10);
  fgctx.fillText('0',2,zy-2);
  fgctx.fillText(`+${fLabel}`,2,H-3);

  // Plot lines — values inverted so compression (negative) reads upward
  const lines = [
    { data: hist.fs, color: '#e11d48', key:'fs' },
    { data: hist.fd, color: '#ff8800', key:'fd' },
    { data: hist.rs, color: '#3b82f6', key:'rs' },
    { data: hist.rd, color: '#22c55e', key:'rd' }
  ];

  lines.forEach(({ data, color, key }) => {
    if (!seriesVisible[key]) return;
    fgctx.beginPath();
    fgctx.strokeStyle=color; fgctx.lineWidth=1.5;
    data.forEach((v,i) => {
      const x = i/(HIST_MAX-1)*W;
      const y = zy + (v/YF_MAX)*(H*0.5);   // inverted: positive force → down on screen
      i===0 ? fgctx.moveTo(x,y) : fgctx.lineTo(x,y);
    });
    fgctx.stroke();
  });
}

// ═══════════════════════════════════════════════════════════
//  SUSPENSION VELOCITY GRAPH
// ═══════════════════════════════════════════════════════════
const vg    = document.getElementById('vgraph');
const vgctx = vg.getContext('2d');

function resizeVG() { if (vg.clientWidth) vg.width = vg.clientWidth; }
window.addEventListener('resize', resizeVG);

function drawVelocityGraph() {
  const W=vg.width, H=vg.height;
  if (!W||!H) return;
  const vgScale = document.getElementById('vgraph-scale');
  const V_MAX = V_MAX_SIM * (vgScale ? vgScale.value / 100 : 1);

  vgctx.fillStyle='#0a0a0a'; vgctx.fillRect(0,0,W,H);

  // Grid
  vgctx.strokeStyle='#1a1a1a'; vgctx.lineWidth=1;
  for (let i=0; i<=4; i++) {
    const y=H*i/4;
    vgctx.beginPath(); vgctx.moveTo(0,y); vgctx.lineTo(W,y); vgctx.stroke();
  }
  // Zero line
  const zy=H*0.5;
  vgctx.strokeStyle='#484848'; vgctx.lineWidth=2;
  vgctx.beginPath(); vgctx.moveTo(0,zy); vgctx.lineTo(W,zy); vgctx.stroke();

  // Y axis labels — compression (negative = extending fork) shown upward
  vgctx.fillStyle='#555'; vgctx.font='9px sans-serif'; vgctx.textAlign='left';
  vgctx.fillText(`-${V_MAX.toFixed(2)}m/s`,2,10);
  vgctx.fillText('0',2,zy-2);
  vgctx.fillText(`+${V_MAX.toFixed(2)}m/s`,2,H-3);

  // Plot lines — front fork and rear suspension travel velocities
  const lines = [
    { data: hist.fv, color: '#ff8800', key:'fv' },
    { data: hist.rv, color: '#22c55e', key:'rv' }
  ];

  lines.forEach(({ data, color, key }) => {
    if (!seriesVisible[key]) return;
    vgctx.beginPath();
    vgctx.strokeStyle=color; vgctx.lineWidth=1.5;
    data.forEach((v,i) => {
      const x = i/(HIST_MAX-1)*W;
      const y = zy + (v/V_MAX)*(H*0.5);
      i===0 ? vgctx.moveTo(x,y) : vgctx.lineTo(x,y);
    });
    vgctx.stroke();
  });
}

// ═══════════════════════════════════════════════════════════
//  CURVE EDITOR
// ═══════════════════════════════════════════════════════════
const cc   = document.getElementById('curve-canvas');
const cctx = cc.getContext('2d');
const GP   = { l:48, r:16, t:12, b:34 };

let curveMode = 'comp';

function resizeCurveCanvas() {
  cc.width  = cc.clientWidth;
  cc.height = cc.clientHeight || 220;
  drawCurveEditor();
}
window.addEventListener('resize', resizeCurveCanvas);

function ptToScreen(nx, ny) {
  const gw=cc.width-GP.l-GP.r, gh=cc.height-GP.t-GP.b;
  return { sx: GP.l+nx*gw, sy: GP.t+(1-ny)*gh };
}
function screenToPt(sx, sy) {
  const gw=cc.width-GP.l-GP.r, gh=cc.height-GP.t-GP.b;
  return { nx:(sx-GP.l)/gw, ny:1-(sy-GP.t)/gh };
}

function getActivePts() {
  if (wheelMode==='front') return curveMode==='comp' ? compPts_F : rebPts_F;
  return curveMode==='comp' ? compPts_R : rebPts_R;
}
function getActiveLUT() {
  if (wheelMode==='front') return curveMode==='comp' ? compLUT_F : rebLUT_F;
  return curveMode==='comp' ? compLUT_R : rebLUT_R;
}
function rebuildActiveLUT() {
  const pts = getActivePts();
  const lut = buildCurveLUT(pts);
  if (wheelMode==='front') {
    if (curveMode==='comp') compLUT_F=lut; else rebLUT_F=lut;
  } else {
    if (curveMode==='comp') compLUT_R=lut; else rebLUT_R=lut;
  }
}

function drawCurveEditor() {
  const W=cc.width, H=cc.height;
  if (!W||!H) return;
  const gw=W-GP.l-GP.r, gh=H-GP.t-GP.b;

  cctx.clearRect(0,0,W,H);
  cctx.fillStyle='#0f0f0f'; cctx.fillRect(0,0,W,H);
  cctx.fillStyle='#0a0a0a'; cctx.fillRect(GP.l,GP.t,gw,gh);

  // Grid
  cctx.strokeStyle='#1f1f1f'; cctx.lineWidth=1;
  for (let i=0; i<=4; i++) {
    cctx.beginPath(); cctx.moveTo(GP.l+(i/4)*gw, GP.t); cctx.lineTo(GP.l+(i/4)*gw, GP.t+gh); cctx.stroke();
    cctx.beginPath(); cctx.moveTo(GP.l, GP.t+(i/4)*gh); cctx.lineTo(GP.l+gw, GP.t+(i/4)*gh); cctx.stroke();
  }

  // X axis labels (0–3 m/s)
  cctx.fillStyle='#555'; cctx.font='10px sans-serif'; cctx.textAlign='center';
  for (let i=0; i<=4; i++) {
    cctx.fillText((i*V_MAX_SIM/4).toFixed(1), GP.l+(i/4)*gw, GP.t+gh+20);
  }
  cctx.fillStyle='#444'; cctx.fillText('m/s', GP.l+gw/2, GP.t+gh+30);

  // Y axis labels
  const F_MAX_LABEL = wheelMode==='front' ? F_MAX_F : F_MAX_R;
  cctx.textAlign='right';
  for (let i=0; i<=4; i++) {
    cctx.fillStyle='#555';
    cctx.fillText(Math.round(i*F_MAX_LABEL/4)+'N', GP.l-4, GP.t+(1-i/4)*gh+4);
  }
  cctx.save();
  cctx.translate(10, GP.t+gh/2); cctx.rotate(-Math.PI/2);
  cctx.textAlign='center'; cctx.fillStyle='#444'; cctx.font='10px sans-serif';
  cctx.fillText('N', 0, 0);
  cctx.restore();

  // Draw both comp/reb curves for current wheel
  const pairs = [
    { ptsKey: wheelMode==='front'?'compPts_F':'compPts_R', mode:'comp', color:'#e11d48', label:'Comp' },
    { ptsKey: wheelMode==='front'?'rebPts_F':'rebPts_R',  mode:'reb',  color:'#aaaaaa', label:'Reb' }
  ];
  const ptsMap = { compPts_F, rebPts_F, compPts_R, rebPts_R };
  const lutMap = { compPts_F:compLUT_F, rebPts_F:rebLUT_F, compPts_R:compLUT_R, rebPts_R:rebLUT_R };

  pairs.forEach(({ ptsKey, mode, color, label }) => {
    const pts    = ptsMap[ptsKey];
    const lut    = lutMap[ptsKey];
    const active = mode===curveMode;
    cctx.globalAlpha = active ? 1.0 : 0.20;

    // Build a draw path that extends to the graph edges (x=0 and x=1) by
    // extrapolating past the first/last control points (clipped to the plot rect).
    const drawPts = [{ x:0, y:evalCurveLUT(lut,0) }];
    lut.forEach(p => { if (p.x>0 && p.x<1) drawPts.push(p); });
    drawPts.push({ x:1, y:evalCurveLUT(lut,1) });
    cctx.save();
    cctx.beginPath(); cctx.rect(GP.l, GP.t, gw, gh); cctx.clip();
    cctx.beginPath();
    drawPts.forEach((p,i) => {
      const s=ptToScreen(p.x,p.y);
      i===0 ? cctx.moveTo(s.sx,s.sy) : cctx.lineTo(s.sx,s.sy);
    });
    cctx.strokeStyle=color; cctx.lineWidth=active?2.5:1.5; cctx.stroke();
    cctx.restore();

    if (lut.length) {
      const last=ptToScreen(lut[lut.length-1].x, lut[lut.length-1].y);
      cctx.fillStyle=color; cctx.font='bold 9px sans-serif'; cctx.textAlign='left';
      cctx.fillText(label, last.sx+4, last.sy+4);
    }
    if (active) {
      pts.forEach((p,i) => {
        const s=ptToScreen(p.x,p.y);
        cctx.beginPath(); cctx.arc(s.sx,s.sy,7,0,Math.PI*2);
        cctx.fillStyle=i===0?'#222':color; cctx.fill();
        cctx.strokeStyle='#f0f0f0'; cctx.lineWidth=1.5; cctx.stroke();
      });
    }
    cctx.globalAlpha=1.0;
  });

  // Border
  cctx.strokeStyle='#1f1f1f'; cctx.lineWidth=1;
  cctx.strokeRect(GP.l, GP.t, gw, gh);
}

// Drag & click
let dragIdx=-1;

function getPos(e) {
  const r=cc.getBoundingClientRect();
  const cx=e.touches?e.touches[0].clientX:e.clientX;
  const cy=e.touches?e.touches[0].clientY:e.clientY;
  return { sx:(cx-r.left)*(cc.width/r.width), sy:(cy-r.top)*(cc.height/r.height) };
}

function findHit(sx, sy) {
  const pts=getActivePts();
  // Include endpoints (i=0 and last) so they can be dragged too.
  for (let i=0; i<pts.length; i++) {
    const s=ptToScreen(pts[i].x, pts[i].y);
    if (Math.hypot(s.sx-sx, s.sy-sy)<15) return i;
  }
  return -1;
}

function doDrag(sx, sy) {
  if (dragIdx<0) return;
  const pts=getActivePts();
  const {nx,ny}=screenToPt(sx,sy);
  const i=dragIdx;
  let newX;
  if (i===0)                  newX=Math.max(0, Math.min(pts[1].x-0.02, nx));
  else if (i===pts.length-1)  newX=Math.max(pts[i-1].x+0.02, Math.min(1, nx));
  else                        newX=Math.max(pts[i-1].x+0.02, Math.min(pts[i+1].x-0.02, nx));
  // Endpoints are now Y-movable too (no longer pinned to y=0 / the graph edges).
  const newY=Math.max(0, Math.min(1, ny));
  pts[i]={x:newX, y:newY};
  rebuildActiveLUT();
  drawCurveEditor();
}

cc.addEventListener('mousedown', e => {
  if (e.button!==0) return;
  const p=getPos(e);
  const hit=findHit(p.sx,p.sy);
  if (hit>=0) { dragIdx=hit; return; }
  const pts=getActivePts();
  const {nx,ny}=screenToPt(p.sx,p.sy);
  if (nx>0.02&&nx<0.98&&ny>=0&&ny<=1.02) {
    if (!pts.some(pt=>Math.abs(pt.x-nx)<0.05)) {
      pts.push({x:Math.max(0.02,Math.min(0.98,nx)), y:Math.max(0,Math.min(1,ny))});
      pts.sort((a,b)=>a.x-b.x);
      rebuildActiveLUT();
      drawCurveEditor();
    }
  }
});
cc.addEventListener('mousemove',  e=>{ const p=getPos(e); doDrag(p.sx,p.sy); });
cc.addEventListener('mouseup',    ()=>{ dragIdx=-1; });
cc.addEventListener('mouseleave', ()=>{ dragIdx=-1; });
cc.addEventListener('contextmenu', e=>{
  e.preventDefault();
  const p=getPos(e);
  const pts=getActivePts();
  if (pts.length<=3) return;
  const hit=findHit(p.sx,p.sy);
  if (hit>0 && hit<pts.length-1) { pts.splice(hit,1); rebuildActiveLUT(); drawCurveEditor(); }
});
cc.addEventListener('touchstart', e=>{ e.preventDefault(); const p=getPos(e); dragIdx=findHit(p.sx,p.sy); },{passive:false});
cc.addEventListener('touchmove',  e=>{ e.preventDefault(); const p=getPos(e); doDrag(p.sx,p.sy); },{passive:false});
cc.addEventListener('touchend',   ()=>{ dragIdx=-1; });

function setCurveMode(mode) {
  curveMode=mode;
  document.getElementById('btn-comp').classList.toggle('active', mode==='comp');
  document.getElementById('btn-reb').classList.toggle('active',  mode==='reb');
  drawCurveEditor();
}

function applyPreset(name) {
  const src=PRESETS[name];
  const pts=getActivePts();
  pts.length=0;
  src.forEach(p=>pts.push({...p}));
  rebuildActiveLUT();
  drawCurveEditor();
}

// ═══════════════════════════════════════════════════════════
//  GAS / BRAKE BUTTONS
// ═══════════════════════════════════════════════════════════
(function() {
  function setGas(on) {
    gasPressed = on;
    document.getElementById('btn-gas').classList.toggle('held', on);
  }
  function setBrake(on) {
    brakePressed = on;
    document.getElementById('btn-brake').classList.toggle('held', on);
  }

  const gasBtn   = document.getElementById('btn-gas');
  const brakeBtn = document.getElementById('btn-brake');

  // Mouse
  gasBtn.addEventListener('mousedown',  () => setGas(true));
  brakeBtn.addEventListener('mousedown',() => setBrake(true));
  window.addEventListener('mouseup',    () => { setGas(false); setBrake(false); });

  // Touch (prevent scroll while holding)
  gasBtn.addEventListener('touchstart',   e => { e.preventDefault(); setGas(true); },   {passive:false});
  gasBtn.addEventListener('touchend',     e => { e.preventDefault(); setGas(false); },  {passive:false});
  brakeBtn.addEventListener('touchstart', e => { e.preventDefault(); setBrake(true); }, {passive:false});
  brakeBtn.addEventListener('touchend',   e => { e.preventDefault(); setBrake(false); },{passive:false});

  // Keyboard shortcuts: G / ArrowRight = gas,  B / ArrowLeft = brake
  window.addEventListener('keydown', e => {
    if (e.key === 'g' || e.key === 'G' || e.key === 'ArrowRight') { e.preventDefault(); setGas(true); }
    if (e.key === 'b' || e.key === 'B' || e.key === 'ArrowLeft')  { e.preventDefault(); setBrake(true); }
  });
  window.addEventListener('keyup', e => {
    if (e.key === 'g' || e.key === 'G' || e.key === 'ArrowRight') setGas(false);
    if (e.key === 'b' || e.key === 'B' || e.key === 'ArrowLeft')  setBrake(false);
  });
})();

// ═══════════════════════════════════════════════════════════
//  GRAPH LEGEND TOGGLES  (click a label to show/hide its line)
// ═══════════════════════════════════════════════════════════
function applyLegendStyle() {
  document.querySelectorAll('.leg').forEach(el => {
    el.style.opacity = seriesVisible[el.dataset.key] ? '1' : '0.3';
  });
}
document.querySelectorAll('.leg').forEach(el => {
  el.addEventListener('click', () => {
    const k = el.dataset.key;
    seriesVisible[k] = !seriesVisible[k];
    applyLegendStyle();
  });
});
applyLegendStyle();

// ═══════════════════════════════════════════════════════════
//  COLLAPSIBLE CARDS
// ═══════════════════════════════════════════════════════════
function toggleCard(titleEl) {
  const body = titleEl.nextElementSibling;
  const arrow = titleEl.querySelector('.card-arrow');
  const collapsed = body.classList.toggle('collapsed');
  arrow.textContent = collapsed ? '◀' : '▼';
  // For curve card, toggle flex layout so the card shrinks when collapsed
  const card = titleEl.closest('.card');
  if (card && card.id === 'curve-card') {
    card.classList.toggle('collapsed-curve', collapsed);
  }
}

//  STARTUP
// ═══════════════════════════════════════════════════════════
requestAnimationFrame(resizeCurveCanvas);
requestAnimationFrame(resizeFG);
requestAnimationFrame(resizeVG);
requestAnimationFrame(draw);
// ═══════════════════════════════════════════════════════════
//  ZOOM BUTTONS
// ═══════════════════════════════════════════════════════════
(function() {
  const ZOOM_MIN = 0.25, ZOOM_MAX = 4.0, ZOOM_STEP = 1.25;
  document.getElementById('btn-zoom-in').addEventListener('click', () => {
    userZoom = Math.min(ZOOM_MAX, userZoom * ZOOM_STEP);
    PM = PM_base * userZoom;
  });
  document.getElementById('btn-zoom-out').addEventListener('click', () => {
    userZoom = Math.max(ZOOM_MIN, userZoom / ZOOM_STEP);
    PM = PM_base * userZoom;
  });
})();

// Re-run after layout fully settles so flex heights are computed
setTimeout(() => { resizeCurveCanvas(); resizeFG(); resizeVG(); }, 100);
</script>
