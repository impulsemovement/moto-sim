<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }
body { background: #0d1117; color: #e2e8f0; font-family: sans-serif; padding: 10px; }
canvas { display: block; background: #0d1117; border: 1px solid #30363d; border-radius: 8px; }
.ui { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-top: 10px; }
.card { background: #161b22; border: 1px solid #30363d; border-radius: 8px; padding: 12px; }
label { font-size: 12px; color: #8b949e; display: flex; justify-content: space-between; margin-bottom: 4px; }
label span { color: #e2e8f0; font-weight: 600; }
input[type=range] { width: 100%; margin-bottom: 10px; accent-color: #3b82f6; }
.stats { display: grid; grid-template-columns: repeat(4,1fr); gap: 8px; margin-top: 10px; }
.stat { background: #161b22; border: 1px solid #30363d; border-radius: 6px; padding: 8px; text-align: center; }
.stat-n { font-size: 20px; font-weight: 700; color: #60a5fa; }
.stat-l { font-size: 10px; color: #8b949e; margin-top: 2px; }

/* ── Curve editor toggle ─────────────────────────────────────────────────── */
.toggle-group { display:flex; border:1px solid #30363d; border-radius:6px; overflow:hidden; }
.toggle-btn {
  background:#161b22; color:#8b949e; border:none; padding:5px 14px;
  font-size:12px; cursor:pointer; transition:background 0.15s, color 0.15s;
}
.toggle-btn:not(:last-child) { border-right:1px solid #30363d; }
.toggle-btn.active { background:#1d3a5f; color:#93c5fd; font-weight:600; }
.toggle-btn:hover:not(.active) { background:#21262d; }

/* ── Preset buttons ──────────────────────────────────────────────────────── */
.preset-btn {
  background:#1f2937; color:#94a3b8; border:1px solid #374151; border-radius:4px;
  padding:4px 10px; font-size:11px; cursor:pointer; transition:background 0.15s, color 0.15s;
}
.preset-btn:hover { background:#374151; color:#e2e8f0; }

/* ── Curve canvas ────────────────────────────────────────────────────────── */
#curve-canvas { display:block; width:100%; cursor:crosshair; border-radius:4px; }
</style>
</head>
<body>

<canvas id="c"></canvas>

<div class="stats">
  <div class="stat"><div class="stat-n" id="st-travel">0</div><div class="stat-l">Travel (mm)</div></div>
  <div class="stat"><div class="stat-n" id="st-spring">0</div><div class="stat-l">Spring F (N)</div></div>
  <div class="stat"><div class="stat-n" id="st-damp">0</div><div class="stat-l">Damper F (N)</div></div>
  <div class="stat"><div class="stat-n" id="st-speed">30</div><div class="stat-l">Speed (km/h)</div></div>
</div>

<div class="ui">
  <div class="card">
    <label>Spring rate <span id="lk">85 N/mm</span></label>
    <input type="range" id="k" min="20" max="200" value="85">
    <label>Preload <span id="lpre">0 mm</span></label>
    <input type="range" id="pre" min="-20" max="20" value="0">
    <label>Rider mass <span id="lmass">75 kg</span></label>
    <input type="range" id="mass" min="40" max="140" value="75">
  </div>
  <div class="card">
    <label>Comp gain <span id="ldc">0.40×</span></label>
    <input type="range" id="dc" min="0" max="200" value="40">
    <label>Reb gain <span id="ldr">0.40×</span></label>
    <input type="range" id="dr" min="0" max="200" value="40">
    <label>Speed <span id="lspeed">30 km/h</span></label>
    <input type="range" id="speed" min="5" max="100" value="30">
  </div>
  <div class="card" style="grid-column:1/-1">
    <label>Terrain <span id="lterrain">Bumps</span></label>
    <input type="range" id="terrain" min="0" max="3" value="0" step="1">
    <div style="display:flex;gap:8px;font-size:11px;color:#8b949e;margin-top:-6px;margin-bottom:10px">
      <span style="flex:1;text-align:left">Bumps</span>
      <span style="flex:1;text-align:center">Whoops</span>
      <span style="flex:1;text-align:center">Step drop</span>
      <span style="flex:1;text-align:right">Flat</span>
    </div>
    <div style="display:grid;grid-template-columns:1fr 1fr;gap:0 16px">
      <div>
        <label>Amplitude <span id="lamp">1.00&times;</span></label>
        <input type="range" id="amp" min="10" max="300" value="100">
      </div>
      <div>
        <label>Frequency <span id="lfreq">1.00&times;</span></label>
        <input type="range" id="freq" min="20" max="300" value="100">
      </div>
    </div>
  </div>

  <!-- ── Damping curve editor ─────────────────────────────────────────── -->
  <div class="card" id="curve-card" style="grid-column:1/-1">
    <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:10px;flex-wrap:wrap;gap:8px">
      <div style="display:flex;align-items:center;gap:10px">
        <div class="toggle-group">
          <button class="toggle-btn active" id="btn-comp" onclick="setCurveMode('comp')">Compression</button>
          <button class="toggle-btn"        id="btn-reb"  onclick="setCurveMode('reb')">Rebound</button>
        </div>
        <span style="font-size:11px;color:#64748b">F vs V &middot; drag points &middot; gain slider scales output</span>
      </div>
      <div style="display:flex;gap:6px;flex-wrap:wrap">
        <button class="preset-btn" onclick="applyPreset('linear')">Linear</button>
        <button class="preset-btn" onclick="applyPreset('progressive')">Progressive</button>
        <button class="preset-btn" onclick="applyPreset('digressive')">Digressive</button>
        <button class="preset-btn" onclick="applyPreset('quadratic')">Quadratic</button>
      </div>
    </div>
    <canvas id="curve-canvas" height="210"></canvas>
  </div>
</div>

<script>
// ════════════════════════════════════════════════════════════════════════════
//  SIMULATION CANVAS
// ════════════════════════════════════════════════════════════════════════════
const canvas = document.getElementById('c');
const ctx    = canvas.getContext('2d');

function resize() {
  canvas.width  = window.innerWidth - 20;
  canvas.height = 300;
}
resize();
window.addEventListener('resize', resize);

// ════════════════════════════════════════════════════════════════════════════
//  PARAMETERS
// ════════════════════════════════════════════════════════════════════════════
let P = { k:85, pre:0, dc:0.4, dr:0.4, mass:75, speed:30, terrain:0, amp:1.0, freq:1.0 };
const TERRAINS = ['Bumps','Whoops','Step drop','Flat'];

function bind(id, lblId, fn) {
  const el  = document.getElementById(id);
  const lbl = document.getElementById(lblId);
  el.addEventListener('input', () => { lbl.textContent = fn(+el.value); });
}
bind('k',       'lk',       v => { P.k       = v;        return v + ' N/mm'; });
bind('pre',     'lpre',     v => { P.pre      = v;        return v + ' mm'; });
bind('dc',      'ldc',      v => { P.dc       = v / 100;  return (v/100).toFixed(2) + '\xd7'; });
bind('dr',      'ldr',      v => { P.dr       = v / 100;  return (v/100).toFixed(2) + '\xd7'; });
bind('mass',    'lmass',    v => { P.mass      = v;        return v + ' kg'; });
bind('speed',   'lspeed',   v => { P.speed     = v; document.getElementById('st-speed').textContent = v; return v + ' km/h'; });
bind('terrain', 'lterrain', v => { P.terrain   = +v;       return TERRAINS[+v]; });
bind('amp',     'lamp',     v => { P.amp       = v / 100;  return (v/100).toFixed(2) + '\xd7'; });
bind('freq',    'lfreq',    v => { P.freq      = v / 100;  return (v/100).toFixed(2) + '\xd7'; });

// ════════════════════════════════════════════════════════════════════════════
//  PHYSICS CONSTANTS
// ════════════════════════════════════════════════════════════════════════════
const WHEEL_R    = 36;       // px  wheel radius (2x visual scale)
const REST_LEN   = 130;      // px  suspension natural length
const MAX_TRAVEL = 200;      // px  full extension limit
const MIN_TRAVEL = 15;       // px  full compression limit

const G_EFF      = 800;      // px/s2  effective gravity (positive = downward)
const PX_SCALE   = 80;       // N/mm to display force units
const M_UNSPRUNG = 15;       // kg  unsprung mass (wheel + tire + fork lower)
const K_TIRE     = 160000;   // display units  stiff tire spring

const V_MAX_SIM  = 1000;            // px/s maps to 4.0 m/s on graph
const F_MAX_SIM  = PX_SCALE * 4000; // display force units maps to 4000 N on graph

// ════════════════════════════════════════════════════════════════════════════
//  CATMULL-ROM SPLINE
// ════════════════════════════════════════════════════════════════════════════
const CURVE_SAMPLES = 210;

function buildCurveLUT(pts) {
  // pts: 4 control points [{x,y}], x ascending, all in [0,1]
  // Phantom endpoints so the curve passes exactly through pts[0] and pts[3]
  const ext = [
    { x: 2*pts[0].x - pts[1].x, y: 2*pts[0].y - pts[1].y },
    pts[0], pts[1], pts[2], pts[3],
    { x: 2*pts[3].x - pts[2].x, y: 2*pts[3].y - pts[2].y }
  ]; // ext[1..4] = pts[0..3], 3 real segments

  const segs        = 3;
  const stepsPerSeg = Math.ceil(CURVE_SAMPLES / segs);
  const lut         = [];

  for (let s = 0; s < segs; s++) {
    // Interpolate between ext[s+1] and ext[s+2]
    const p0 = ext[s], p1 = ext[s+1], p2 = ext[s+2], p3 = ext[s+3];
    const endI = (s === segs - 1) ? stepsPerSeg : stepsPerSeg - 1;
    for (let i = 0; i <= endI; i++) {
      const t  = i / stepsPerSeg;
      const t2 = t*t, t3 = t2*t;
      const c0 = -0.5*t3 + t2       - 0.5*t;
      const c1 =  1.5*t3 - 2.5*t2          + 1.0;
      const c2 = -1.5*t3 + 2.0*t2   + 0.5*t;
      const c3 =  0.5*t3 - 0.5*t2;
      lut.push({
        x: Math.max(0, Math.min(1,   c0*p0.x + c1*p1.x + c2*p2.x + c3*p3.x)),
        y: Math.max(0, Math.min(1.5, c0*p0.y + c1*p1.y + c2*p2.y + c3*p3.y))
      });
    }
  }

  lut.sort((a, b) => a.x - b.x);
  lut[0]              = { x: pts[0].x, y: pts[0].y };
  lut[lut.length - 1] = { x: pts[3].x, y: pts[3].y };
  return lut;
}

function evalCurveLUT(lut, x) {
  x = Math.max(0, Math.min(1, x));
  if (x <= lut[0].x)             return lut[0].y;
  if (x >= lut[lut.length-1].x)  return lut[lut.length-1].y;
  let lo = 0, hi = lut.length - 1;
  while (hi - lo > 1) {
    const mid = (lo + hi) >> 1;
    if (lut[mid].x <= x) lo = mid; else hi = mid;
  }
  const t = (x - lut[lo].x) / (lut[hi].x - lut[lo].x);
  return lut[lo].y + t * (lut[hi].y - lut[lo].y);
}

// ════════════════════════════════════════════════════════════════════════════
//  DAMPING CURVE STATE & PRESETS
// ════════════════════════════════════════════════════════════════════════════
const PRESETS = {
  linear:      [{x:0,y:0},{x:0.33,y:0.33},{x:0.67,y:0.67},{x:1,y:1}],
  progressive: [{x:0,y:0},{x:0.33,y:0.12},{x:0.67,y:0.52},{x:1,y:1}],
  digressive:  [{x:0,y:0},{x:0.33,y:0.62},{x:0.67,y:0.88},{x:1,y:1}],
  quadratic:   [{x:0,y:0},{x:0.33,y:0.11},{x:0.67,y:0.44},{x:1,y:1}]
};

let compPts = PRESETS.linear.map(p => ({...p}));
let rebPts  = PRESETS.linear.map(p => ({...p}));
let compLUT = buildCurveLUT(compPts);
let rebLUT  = buildCurveLUT(rebPts);

// ════════════════════════════════════════════════════════════════════════════
//  TERRAIN
// ════════════════════════════════════════════════════════════════════════════
function groundY(wx) {
  const ch   = canvas.height;
  const base = ch * 0.80;
  const amp  = P.amp;
  const freq = P.freq;
  switch (P.terrain) {
    case 0: // Bumps — amplitude and frequency scaled
      return base + Math.sin(wx * 0.045 * freq) * 35 * amp
                  + Math.sin(wx * 0.09  * freq) * 16 * amp;
    case 1: { // Whoops
      const wl    = 55 / freq;          // wavelength shrinks as freq rises
      const phase = (wx % wl) / wl;
      return base + (phase < 0.5 ? Math.sin(phase * Math.PI * 2) * 45 * amp : 0);
    }
    case 2: { // Step drop — smooth cosine edges, amp scales drop height
      const cycle     = 600;
      const dropH     = 61 * amp;
      const edgeW     = 40 / freq;      // edge transition width
      const zone      = ((wx % cycle) + cycle) % cycle;
      const dropStart = 200, dropEnd = dropStart + edgeW;
      const riseStart = 340, riseEnd  = riseStart + edgeW;
      let t = 0;
      if (zone >= dropStart && zone < dropEnd) {
        t = (zone - dropStart) / edgeW;
        t = (1 - Math.cos(t * Math.PI)) / 2;      // 0 → 1 smoothly
      } else if (zone >= dropEnd && zone < riseStart) {
        t = 1;
      } else if (zone >= riseStart && zone < riseEnd) {
        t = (zone - riseStart) / edgeW;
        t = (1 + Math.cos(t * Math.PI)) / 2;      // 1 → 0 smoothly
      }
      return base + t * dropH;
    }
    case 3: return base; // Flat
  }
}

// ════════════════════════════════════════════════════════════════════════════
//  TWO-MASS PHYSICS STATE
// ════════════════════════════════════════════════════════════════════════════
let worldX      = 0;
let sprungY     = 0;
let vy          = 0;
let wheelY      = 0;
let vWheel      = 0;
let initialized = false;
let lastTs      = null;

// ════════════════════════════════════════════════════════════════════════════
//  MAIN DRAW LOOP
// ════════════════════════════════════════════════════════════════════════════
function draw(ts) {
  requestAnimationFrame(draw);

  const W = canvas.width, H = canvas.height;
  let dt = 0;
  if (lastTs !== null) dt = Math.min((ts - lastTs) / 1000, 0.04);
  lastTs = ts;

  const pxPerSec   = (P.speed / 3.6) * 30;
  worldX          += pxPerSec * dt;

  const screenWX   = W * 0.38;

  // Find the wheel centre height where the full circle rests on the terrain.
  // For each horizontal offset dx within the wheel footprint, the minimum
  // allowed centre Y is groundY(x+dx) - sqrt(R²-dx²).  The wheel rests at
  // the most restrictive (minimum) of all these constraints.
  const WHEEL_STEPS = 32;
  let natural_wy = Infinity;
  for (let i = 0; i <= WHEEL_STEPS; i++) {
    const dx        = ((i / WHEEL_STEPS) - 0.5) * 2 * WHEEL_R;
    const clearance = Math.sqrt(Math.max(0, WHEEL_R * WHEEL_R - dx * dx));
    natural_wy      = Math.min(natural_wy, groundY(worldX + screenWX + dx) - clearance);
  }

  if (!initialized) {
    wheelY  = natural_wy;
    const K_S_init = P.k * PX_SCALE;
    const disp_eq  = -G_EFF * (P.mass + 100) / K_S_init;
    sprungY = wheelY - REST_LEN - disp_eq;
    initialized = true;
  }

  // ── Physics ───────────────────────────────────────────────────────────
  const M_S      = P.mass + 100;
  const K_S      = P.k * PX_SCALE;

  const disp     = (wheelY - sprungY) - REST_LEN - P.pre;
  const rv       = vWheel - vy;

  const f_spring = K_S * disp;

  // F-v curve damping
  const normV     = Math.min(1, Math.abs(rv) / V_MAX_SIM);
  const isComp    = rv < 0;
  const gain      = isComp ? P.dc : P.dr;
  const activeLUT = isComp ? compLUT : rebLUT;
  const curveFrac = evalCurveLUT(activeLUT, normV);
  const f_damp    = (rv === 0 ? 0 : Math.sign(rv)) * gain * curveFrac * F_MAX_SIM;

  const f_tire   = wheelY > natural_wy ? -K_TIRE * (wheelY - natural_wy) : 0;

  const f_susp   = f_spring + f_damp;
  const a_body   = G_EFF + f_susp  / M_S;
  const a_wheel  = G_EFF - f_susp  / M_UNSPRUNG + f_tire / M_UNSPRUNG;

  vy      += a_body  * dt;
  vWheel  += a_wheel * dt;
  sprungY += vy      * dt;
  wheelY  += vWheel  * dt;

  // Hard stops
  const travel = wheelY - sprungY;
  if (travel > MAX_TRAVEL) { wheelY = sprungY + MAX_TRAVEL; vWheel = vy - Math.abs(vWheel - vy) * 0.2; }
  if (travel < MIN_TRAVEL) { wheelY = sprungY + MIN_TRAVEL; vWheel = vy + Math.abs(vWheel - vy) * 0.2; }

  const travelMM = Math.round(wheelY - sprungY);
  document.getElementById('st-travel').textContent = travelMM;
  document.getElementById('st-spring').textContent = Math.round(Math.abs(f_spring) / PX_SCALE);
  document.getElementById('st-damp').textContent   = Math.round(Math.abs(f_damp)   / PX_SCALE);

  // ── Draw scene ────────────────────────────────────────────────────────
  ctx.clearRect(0, 0, W, H);
  ctx.fillStyle = '#0d1117'; ctx.fillRect(0, 0, W, H);
  ctx.fillStyle = '#0a1628'; ctx.fillRect(0, 0, W, H * 0.78);

  // Ground
  ctx.beginPath();
  for (let px = 0; px <= W; px += 3) {
    const y = groundY(worldX + px);
    px === 0 ? ctx.moveTo(px, y) : ctx.lineTo(px, y);
  }
  ctx.lineTo(W, H); ctx.lineTo(0, H); ctx.closePath();
  ctx.fillStyle = '#1a2e1a'; ctx.fill();
  ctx.strokeStyle = '#2d5a27'; ctx.lineWidth = 2; ctx.stroke();

  // Travel bar
  const bx = W - 22, bTop = 20, bH = H * 0.6;
  ctx.fillStyle = '#1f2937';
  ctx.beginPath(); ctx.roundRect(bx, bTop, 12, bH, 6); ctx.fill();
  const fillFrac = Math.max(0, Math.min(1, (travelMM - MIN_TRAVEL) / (MAX_TRAVEL - MIN_TRAVEL)));
  const fillH    = fillFrac * bH;
  const barColor = fillFrac < 0.5 ? '#4ade80' : fillFrac < 0.8 ? '#facc15' : '#f87171';
  ctx.fillStyle  = barColor;
  ctx.beginPath(); ctx.roundRect(bx, bTop + bH - fillH, 12, fillH, 6); ctx.fill();
  ctx.fillStyle = '#64748b'; ctx.font = '10px sans-serif'; ctx.textAlign = 'center';
  ctx.fillText('travel', bx + 6, bTop - 6);

  const sx  = screenWX;
  const sy  = sprungY;
  const wx2 = sx;
  const wy2 = wheelY;

  // Fork tube
  ctx.strokeStyle = '#334155'; ctx.lineWidth = 9; ctx.lineCap = 'round';
  ctx.beginPath(); ctx.moveTo(sx, sy + 28); ctx.lineTo(wx2, wy2 - WHEEL_R + 6); ctx.stroke();

  // Spring (zigzag)
  const segs2 = 18, springAmp = 11;
  ctx.strokeStyle = barColor; ctx.lineWidth = 2;
  ctx.beginPath();
  for (let i = 0; i <= segs2 * 4; i++) {
    const t2  = i / (segs2 * 4);
    const py  = sy + (wy2 - sy) * t2;
    const px2 = sx + Math.sin(t2 * Math.PI * 2 * segs2) * springAmp;
    i === 0 ? ctx.moveTo(px2, py) : ctx.lineTo(px2, py);
  }
  ctx.stroke();

  // Wheel
  ctx.beginPath(); ctx.arc(wx2, wy2, WHEEL_R, 0, Math.PI * 2);
  ctx.strokeStyle = '#94a3b8'; ctx.lineWidth = 6; ctx.stroke();
  ctx.strokeStyle = '#475569'; ctx.lineWidth = 2;
  for (let a = 0; a < Math.PI * 2; a += Math.PI / 6) {
    ctx.beginPath(); ctx.arc(wx2, wy2, WHEEL_R - 2, a, a + 0.2); ctx.stroke();
  }
  ctx.beginPath(); ctx.arc(wx2, wy2, 8, 0, Math.PI * 2);
  ctx.fillStyle = '#cbd5e1'; ctx.fill();

  // Airborne tag
  if (f_tire === 0) {
    ctx.fillStyle = '#f59e0b'; ctx.font = 'bold 10px sans-serif'; ctx.textAlign = 'left';
    ctx.fillText('AIR', wx2 + WHEEL_R + 5, wy2 + 4);
  }

  // Body
  ctx.fillStyle = '#1e3a5f'; ctx.strokeStyle = '#3b82f6'; ctx.lineWidth = 2;
  ctx.beginPath(); ctx.roundRect(sx - 45, sy - 45, 90, 45, 6); ctx.fill(); ctx.stroke();
  ctx.fillStyle = '#93c5fd'; ctx.font = 'bold 10px sans-serif'; ctx.textAlign = 'center';
  ctx.fillText('SPRUNG MASS', sx, sy - 22);

  // Travel label
  ctx.fillStyle = '#64748b'; ctx.font = '11px sans-serif'; ctx.textAlign = 'left';
  ctx.fillText('↕ ' + travelMM + 'mm', sx + 18, (sy + wy2) / 2);
}

requestAnimationFrame(draw);

// ════════════════════════════════════════════════════════════════════════════
//  CURVE EDITOR
// ════════════════════════════════════════════════════════════════════════════
const cc   = document.getElementById('curve-canvas');
const cctx = cc.getContext('2d');
const GP   = { l: 52, r: 18, t: 14, b: 36 }; // graph margins

let curveMode = 'comp';

function resizeCurveCanvas() {
  cc.width = cc.clientWidth;
  drawCurveEditor();
}
window.addEventListener('resize', resizeCurveCanvas);

function ptToScreen(nx, ny) {
  const gw = cc.width  - GP.l - GP.r;
  const gh = cc.height - GP.t - GP.b;
  return { sx: GP.l + nx * gw,  sy: GP.t + (1 - ny) * gh };
}

function screenToPt(sx, sy) {
  const gw = cc.width  - GP.l - GP.r;
  const gh = cc.height - GP.t - GP.b;
  return { nx: (sx - GP.l) / gw,  ny: 1 - (sy - GP.t) / gh };
}

function drawCurveEditor() {
  const W  = cc.width, H = cc.height;
  const gw = W - GP.l - GP.r;
  const gh = H - GP.t - GP.b;

  cctx.clearRect(0, 0, W, H);
  cctx.fillStyle = '#0d1117'; cctx.fillRect(0, 0, W, H);

  // Plot background
  cctx.fillStyle = '#0f1923'; cctx.fillRect(GP.l, GP.t, gw, gh);

  // Grid
  cctx.strokeStyle = '#1e2a38'; cctx.lineWidth = 1;
  for (let i = 0; i <= 4; i++) {
    cctx.beginPath(); cctx.moveTo(GP.l + (i/4)*gw, GP.t);         cctx.lineTo(GP.l + (i/4)*gw, GP.t + gh); cctx.stroke();
    cctx.beginPath(); cctx.moveTo(GP.l,             GP.t + (i/4)*gh); cctx.lineTo(GP.l + gw,       GP.t + (i/4)*gh); cctx.stroke();
  }

  // X labels (0–4.0 m/s)
  cctx.fillStyle = '#8b949e'; cctx.font = '10px sans-serif'; cctx.textAlign = 'center';
  for (let i = 0; i <= 4; i++) {
    cctx.fillText((i/4 * 4).toFixed(1), GP.l + (i/4)*gw, GP.t + gh + 20);
  }
  cctx.fillStyle = '#64748b'; cctx.fillText('m/s', GP.l + gw/2, GP.t + gh + 32);

  // Y labels (0–4000 N)
  cctx.textAlign = 'right';
  for (let i = 0; i <= 4; i++) {
    cctx.fillStyle = '#8b949e';
    cctx.fillText((i/4*4000).toFixed(0), GP.l - 5, GP.t + (1 - i/4)*gh + 4);
  }
  cctx.save();
  cctx.translate(12, GP.t + gh/2); cctx.rotate(-Math.PI/2);
  cctx.textAlign = 'center'; cctx.fillStyle = '#64748b';
  cctx.fillText('N', 0, 0);
  cctx.restore();

  // Draw both curves
  [
    { pts: compPts, lut: compLUT, color: '#3b82f6', mode: 'comp', label: 'Comp' },
    { pts: rebPts,  lut: rebLUT,  color: '#22c55e', mode: 'reb',  label: 'Reb'  }
  ].forEach(({ pts, lut, color, mode, label }) => {
    const active = mode === curveMode;
    cctx.globalAlpha = active ? 1.0 : 0.22;

    cctx.beginPath();
    lut.forEach((p, i) => {
      const s = ptToScreen(p.x, p.y);
      i === 0 ? cctx.moveTo(s.sx, s.sy) : cctx.lineTo(s.sx, s.sy);
    });
    cctx.strokeStyle = color; cctx.lineWidth = active ? 2.5 : 1.5; cctx.stroke();

    // Label at curve end
    if (lut.length) {
      const last = ptToScreen(lut[lut.length-1].x, lut[lut.length-1].y);
      cctx.fillStyle = color; cctx.font = 'bold 10px sans-serif'; cctx.textAlign = 'left';
      cctx.fillText(label, last.sx + 4, last.sy + 4);
    }

    // Control point handles (active curve only)
    if (active) {
      pts.forEach((p, i) => {
        const s = ptToScreen(p.x, p.y);
        cctx.beginPath(); cctx.arc(s.sx, s.sy, 7, 0, Math.PI * 2);
        cctx.fillStyle = i === 0 ? '#334155' : color;
        cctx.fill();
        cctx.strokeStyle = '#e2e8f0'; cctx.lineWidth = 1.5; cctx.stroke();
      });
    }

    cctx.globalAlpha = 1.0;
  });

  // Plot border
  cctx.strokeStyle = '#30363d'; cctx.lineWidth = 1;
  cctx.strokeRect(GP.l, GP.t, gw, gh);
}

// ── Drag ─────────────────────────────────────────────────────────────────────
let dragIdx = -1;

function getPos(e) {
  const r  = cc.getBoundingClientRect();
  const cx = e.touches ? e.touches[0].clientX : e.clientX;
  const cy = e.touches ? e.touches[0].clientY : e.clientY;
  return {
    sx: (cx - r.left) * (cc.width  / r.width),
    sy: (cy - r.top)  * (cc.height / r.height)
  };
}

function findHit(sx, sy) {
  const pts = curveMode === 'comp' ? compPts : rebPts;
  for (let i = 1; i < pts.length; i++) {  // skip p0 (origin, fully fixed)
    const s = ptToScreen(pts[i].x, pts[i].y);
    if (Math.hypot(s.sx - sx, s.sy - sy) < 15) return i;
  }
  return -1;
}

function doDrag(sx, sy) {
  if (dragIdx < 0) return;
  const pts = curveMode === 'comp' ? compPts : rebPts;
  const { nx, ny } = screenToPt(sx, sy);
  const i = dragIdx;

  let newX = pts[i].x;
  if (i > 0 && i < pts.length - 1) {
    newX = Math.max(pts[i-1].x + 0.02, Math.min(pts[i+1].x - 0.02, nx));
  }
  // Last point: x=1 fixed, only y moves
  const newY = (i === 0) ? 0 : Math.max(0, Math.min(1, ny));
  pts[i] = { x: newX, y: newY };

  if (curveMode === 'comp') compLUT = buildCurveLUT(compPts);
  else                       rebLUT  = buildCurveLUT(rebPts);

  drawCurveEditor();
}

cc.addEventListener('mousedown',  e => { const p = getPos(e); dragIdx = findHit(p.sx, p.sy); });
cc.addEventListener('mousemove',  e => { const p = getPos(e); doDrag(p.sx, p.sy); });
cc.addEventListener('mouseup',    ()  => { dragIdx = -1; });
cc.addEventListener('mouseleave', ()  => { dragIdx = -1; });

cc.addEventListener('touchstart',  e => { e.preventDefault(); const p = getPos(e); dragIdx = findHit(p.sx, p.sy); }, { passive: false });
cc.addEventListener('touchmove',   e => { e.preventDefault(); const p = getPos(e); doDrag(p.sx, p.sy); }, { passive: false });
cc.addEventListener('touchend',    ()  => { dragIdx = -1; });

// ── Toggle & Presets ─────────────────────────────────────────────────────────
function setCurveMode(mode) {
  curveMode = mode;
  document.getElementById('btn-comp').classList.toggle('active', mode === 'comp');
  document.getElementById('btn-reb').classList.toggle('active',  mode === 'reb');
  drawCurveEditor();
}

function applyPreset(name) {
  const src = PRESETS[name];
  if (curveMode === 'comp') { compPts = src.map(p => ({...p})); compLUT = buildCurveLUT(compPts); }
  else                       { rebPts  = src.map(p => ({...p})); rebLUT  = buildCurveLUT(rebPts);  }
  drawCurveEditor();
}

// Initial canvas size after layout
requestAnimationFrame(resizeCurveCanvas);
</script>
</body>
</html>
